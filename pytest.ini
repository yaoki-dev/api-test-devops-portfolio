[pytest]
minversion = 6.0
addopts =
    -ra
    -q
    --strict-markers
    --asyncio-mode=auto
    --ignore=tests/unit/test_error_tracker.py
# Note: Coverage options moved to CLI for week-based dynamic targets (6週プラン準拠)
# Week 1: pytest --cov=. --cov-report=term-missing --cov-fail-under=60
# Week 2: pytest --cov=. --cov-report=term-missing --cov-fail-under=65
# Week 3: pytest --cov=. --cov-report=term-missing --cov-fail-under=65
# Week 4: pytest --cov=. --cov-report=term-missing --cov-fail-under=70
# Week 5: pytest --cov=. --cov-report=term-missing --cov-fail-under=80
# Week 5.5: pytest --cov=. --cov-report=term-missing --cov-fail-under=80
# Week 6: pytest --cov=. --cov-report=term-missing --cov-fail-under=85
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, isolated, mock-based)
    integration: Integration tests (external dependencies, real API calls)
    e2e: E2E tests (full user scenarios, Playwright)
    performance: Performance tests (latency/throughput measurement)
    security: Security tests (OWASP Top 10, vulnerability checks)
    regression: Critical regression tests that must pass
    slow: Slow tests (>3s, excluded from local dev)
    external: External API tests (CI/CD only, Rate Limit)
    manual: Manual execution tests requiring human intervention (deselect in CI/CD to prevent automation failures)

# Marker Usage Patterns:
#   Pattern 1: Rate-limited external async API → @pytest.mark.manual + @pytest.mark.external + @pytest.mark.integration + @pytest.mark.asyncio
#   Pattern 2: CI/CD-safe external API         → @pytest.mark.external
#   Pattern 3: Human-interactive demo          → @pytest.mark.manual
