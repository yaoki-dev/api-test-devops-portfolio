[pytest]
minversion = 6.0
addopts =
    -ra
    -q
    --strict-markers
    --cov=.
    --cov-report=term-missing
    --cov-report=html:reports/htmlcov
    --cov-fail-under=85
    --asyncio-mode=auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (external dependencies)
    performance: Performance tests (slow)
    security: Security tests (vulnerability checks)
    regression: Critical regression tests that must pass
