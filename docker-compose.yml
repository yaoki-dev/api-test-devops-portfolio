# docker-compose.yml
# APIテスト + DevOps ポートフォリオ用 Compose 構成
#
# このプロジェクトは常駐サーバーを持たない「外部APIクライアント + テスト」構成のため、
# Compose は以下の2つの役割に絞っている:
#   1. app  : runtime イメージを起動し、設定読込(HEALTHCHECK)を継続検証する常駐デモ
#              ホストの ENVIRONMENT 変数で 4 環境を切替（development / testing / staging / production）
#              例: ENVIRONMENT=staging docker compose up
#   2. test : test ステージで pytest を実行する隔離環境（profiles でデフォルト起動から除外）
#
# 設計方針:
#   - 機密情報は compose に直書きせず .env.<environment> から一括注入（required: false で未存在でも起動可）
#     .env.<environment> は gitignore 対象（.env.example のみコミット）
#   - サーバーが無いため ports は公開しない（リッスンするプロセスが存在しない）
#   - ネットワーク/ボリュームはデフォルトのまま（カスタム定義は不要）

services:
  # ---------------------------------------------------------------
  # app: 本番相当 runtime イメージの起動デモ
  #   - Dockerfile runtime ステージの HEALTHCHECK（設定読込検証）を継承
  #   - 起動時に設定読込を1回検証してログ出力 → 失敗時は非0終了して restart で可視化（fail-loud）
  #   - 成功後は sleep infinity で常駐し、HEALTHCHECK が継続的に healthy を判定
  # ---------------------------------------------------------------
  app:
    build:
      context: .
      target: runtime
    image: api-test:runtime
    # 4環境切替: ホストの ENVIRONMENT 変数で読込 env ファイルを選択
    #   ENVIRONMENT=development / testing / staging / production
    #   ※ 旧短縮形 (dev/test/demo/prod) は Pydantic Environment enum に存在しないため
    #     ValidationError になるが、deprecation phase として command 内で自動マッピング (下記)
    #   例: ENVIRONMENT=staging docker compose up
    env_file:
      - path: .env.${ENVIRONMENT:-development}
        required: false
    # 選択環境を container にも反映（env ファイル未存在でも Pydantic environment が一致）
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
    # 設定読込を検証してから常駐。検証失敗時は && 以降に進まず非0終了
    # 旧短縮形 ENVIRONMENT (dev/test/demo/prod) の deprecation phase 互換マッピング:
    #   ホストで ENVIRONMENT=dev 等を設定している既存ユーザーが Pydantic ValidationError
    #   で起動失敗するのを防ぐため、case 文で完全名に変換する。
    #   将来のリリースで削除予定 (詳細は .env.example の Pydantic 制約セクション参照)。
    command:
      - /bin/sh
      - -c
      - |
        case "${ENVIRONMENT:-development}" in
          dev)  echo "[migration] ENVIRONMENT=dev → development に変換 (短縮形は廃止予定)" >&2; export ENVIRONMENT=development ;;
          test) echo "[migration] ENVIRONMENT=test → testing に変換 (短縮形は廃止予定)" >&2; export ENVIRONMENT=testing ;;
          demo) echo "[migration] ENVIRONMENT=demo → staging に変換 (短縮形は廃止予定)" >&2; export ENVIRONMENT=staging ;;
          prod) echo "[migration] ENVIRONMENT=prod → production に変換 (短縮形は廃止予定)" >&2; export ENVIRONMENT=production ;;
        esac
        python -c "from config.settings import settings; print('[startup] config loaded:', settings.environment, settings.project_name, flush=True)" && exec sleep infinity
    # セキュリティ: 権限昇格の禁止（Dockerfile 側で非root化済み）
    security_opt:
      - "no-new-privileges:true"
    # PID1 を tini にしてシグナルを適切に伝播（クリーンな停止）
    init: true
    # restart: on-failure — 設定読込失敗(非0終了)時のみ再起動。手動停止では再起動しない。
    # 注意: `docker compose up -d` は exit 0 を返すため、起動成否は `docker compose ps` /
    #       HEALTHCHECK 状態で確認すること（exit code では恒久失敗を検知できない）。
    restart: on-failure

  # ---------------------------------------------------------------
  # test: テスト実行専用コンテナ
  #   - profiles により通常の `docker compose up` では起動しない
  #   - 実行: docker compose --profile test run --rm test
  #   - command: ["pytest"] で pyproject.toml [tool.pytest] addopts を採用
  #     （Dockerfile test ステージの CMD `pytest --cov=. --cov-report=term-missing -v` を上書きし、対象を utils/config/models に限定）
  #   - reports/htmlcov, reports/coverage.xml が /app/reports に出力され、host ./reports に永続化
  # ---------------------------------------------------------------
  test:
    build:
      context: .
      target: test
    image: api-test:test
    profiles:
      - test
    # テスト用機密情報は .env.testing から読込（未存在でも起動可、Pydantic Environment値と一致）
    env_file:
      - path: .env.testing
        required: false
    # 環境は testing を明示（.env.testing 未設定でもテストモードを保証。機密ではないため直書き可）
    environment:
      ENVIRONMENT: testing
    # Dockerfile CMD を上書きし pyproject.toml の addopts を採用（カバレッジ scope 是正）
    command: ["pytest", "-m", "(unit or integration) and not external"]
    # カバレッジ成果物を host に永続化（htmlcov / coverage.xml）
    volumes:
      - ./reports:/app/reports
    security_opt:
      - "no-new-privileges:true"
    # appuser (uid=1000) を明示 — Dockerfile USER appuser との整合保証
    # host UID/GID で上書き可能 (Linux local dev で reports/ bind mount EACCES 回避):
    #   UID=$(id -u) GID=$(id -g) docker compose --profile test run --rm test
    # CI (GitHub Actions) は事前に `chmod 777 reports` で回避済み (.github/workflows/docker-compose-test.yml)
    user: "${UID:-1000}:${GID:-1000}"
    # PID1 を tini にしてシグナルを適切に伝播（app サービスと対称化）
    init: true
