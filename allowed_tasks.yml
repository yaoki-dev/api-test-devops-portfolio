# allowed_tasks.yml
# このファイルで許可されたタスクキーと実行コマンド、タイムアウトをマッピングします。
# claude_task_processor.py はこのファイルを参照して、安全なコマンド実行を実現します。

run_unit_tests:
  command: "pytest tests/unit"
  timeout: 300  # 5 minutes

measure_coverage:
  command: "pytest --cov=."
  timeout: 600  # 10 minutes

run_lint:
  command: "ruff check ."
  timeout: 180  # 3 minutes

run_integration_tests:
  command: "pytest tests/integration"
  timeout: 900 # 15 minutes
