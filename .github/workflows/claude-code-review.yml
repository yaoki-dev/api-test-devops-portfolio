name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # All PRs (Max 200 plan - no cost concern)

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Job-level timeout to prevent runaway jobs
    # Skip for Dependabot PRs (package updates don't need code review)
    if: github.actor != 'dependabot[bot]'
    env:
      AST_GREP_MCP_VERSION: "1.1.1"
      MORPH_MCP_VERSION: "0.8.92"
      MGREP_VERSION: "0.1.10"
      # Base tools + mgrep CLI (semantic search via Bash)
      BASE_TOOLS: "Read,Glob,Grep,Task,WebFetch,WebSearch,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(mgrep:*)"
      AST_GREP_TOOLS: "mcp__ast-grep__find_code,mcp__ast-grep__find_code_by_rule"
      MORPH_MCP_TOOLS: "mcp__morph-mcp__warpgrep_codebase_search"
      # MCP configuration: ast-grep (AST analysis) + morph-mcp (AI-powered search)
      # Note: mgrep is a CLI tool (not MCP), configured separately via npm install
      MCP_CONFIG: '{"mcpServers": {"ast-grep": {"command": "npx", "args": ["-y", "@notprolands/ast-grep-mcp@1.1.1"]}, "morph-mcp": {"command": "npx", "args": ["-y", "@morphllm/morphmcp@0.8.92"], "env": {"MORPH_API_KEY": "${{ secrets.MORPH_API_KEY }}", "ENABLED_TOOLS": "warpgrep_codebase_search"}}}}'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Install mgrep CLI for semantic code search (Bash-based, not MCP)
      # MXBAI_API_KEY is passed to Claude Code via settings.env for Bash access
      - name: Install mgrep CLI
        timeout-minutes: 2
        run: |
          echo "🔍 Installing @mixedbread/mgrep@${{ env.MGREP_VERSION }}..."
          npm install -g @mixedbread/mgrep@${{ env.MGREP_VERSION }} 2>&1 && \
            echo "✅ mgrep installed: $(mgrep --version)" || \
            echo "::warning::mgrep installation failed. Semantic search will be unavailable."

      # ast-grep MCP availability verification (graceful degradation)
      # mcp_available controls: --mcp-config injection + allowedTools list
      # When false: review proceeds without AST analysis (degraded but functional)
      - name: Verify ast-grep MCP availability
        id: verify-mcp
        timeout-minutes: 2
        run: |
          set -euo pipefail

          # npm可用性チェック（ubuntu-latestにはnpmがプリインストールされているため、
          # 存在しない場合は環境異常）
          if ! command -v npm &> /dev/null; then
            echo "::error::npm is not installed. This is unexpected on ubuntu-latest."
            echo "::error::AST-based code analysis will be UNAVAILABLE. Review quality may be reduced."
            echo "mcp_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔍 Verifying @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }} availability..."

          # stderrを保持して診断情報を確保（Issue 1対応）
          NPM_OUTPUT=$(npm view @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }} version 2>&1) && NPM_STATUS=0 || NPM_STATUS=$?

          if [ "$NPM_STATUS" -eq 0 ]; then
            echo "✅ Package verified: $NPM_OUTPUT"
            echo "mcp_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ast-grep MCP verification failed (exit code: $NPM_STATUS)"
            echo "::warning::npm output: $NPM_OUTPUT"
            echo "::warning::Review will proceed without AST analysis."
            echo "mcp_available=false" >> "$GITHUB_OUTPUT"
          fi

      # Validate MCP verification output (Issue 2: edge case handling)
      - name: Validate MCP verification
        if: steps.verify-mcp.outputs.mcp_available == ''
        run: |
          echo "::error::MCP verification step did not produce expected output"
          echo "::error::Check 'Verify ast-grep MCP availability' step for errors"
          # Continue with degraded mode rather than failing the workflow
          echo "mcp_available=false" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        # NOTE: Workflow fails if this step fails (default behavior)
        # Claude Action errors (auth, timeout, rate limit) propagate automatically
        id: claude-review
        timeout-minutes: 10
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass MXBAI_API_KEY to Claude Code for mgrep CLI (Bash) access
          # TODO: Verify settings.env propagation to Bash on first CI run
          settings: |
            {
              "env": {
                "MXBAI_API_KEY": "${{ secrets.MXBAI_API_KEY }}"
              }
            }
          # Conditional MCP config: inject only when package is verified available
          # When unavailable: Claude proceeds with BASE_TOOLS only (no AST analysis)
          claude_args: |
            ${{ steps.verify-mcp.outputs.mcp_available == 'true' && format('--mcp-config {0}', env.MCP_CONFIG) || '' }}
            --allowedTools "${{ env.BASE_TOOLS }}${{ steps.verify-mcp.outputs.mcp_available == 'true' && format(',{0},{1}', env.AST_GREP_TOOLS, env.MORPH_MCP_TOOLS) || '' }}"
          prompt: |
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}

            重要: レビュー結果は必ず日本語で出力してください。
            - 問題点の説明は日本語
            - 推奨修正も日本語
            - コード例のコメントも日本語
