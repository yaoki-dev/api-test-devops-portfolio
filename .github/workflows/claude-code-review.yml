name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # All PRs (Max 200 plan - no cost concern)

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip for Dependabot PRs (package updates don't need code review)
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Task,WebFetch,WebSearch,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}

            重要: レビュー結果は必ず日本語で出力してください。
            - 問題点の説明は日本語
            - 推奨修正も日本語
            - コード例のコメントも日本語
