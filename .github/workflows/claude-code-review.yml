name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # All PRs (Max 200 plan - no cost concern)

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Job-level timeout (backup defense: inner step limit 15min)
                         # Rationale: Tool install steps (max 14min) + MCP init (1-2min) + PR analysis (2-3min) + LLM response (2-4min) = 5-22min (job-cap 25min; 3min buffer over documented budget; job-cap fires if all steps hit max)
                         # P1 new steps budget: install-uv(2) + semgrep(3) + crg(4) + serena(5) = 14min max
                         # serena=5min reserves cold-cache p95 for `uvx --from git+...` (Git fetch + ref resolve + wheel install + module import)
                         # Defense-in-depth: step-timeout triggers first per GitHub Actions spec
    # Skip for Dependabot PRs (package updates don't need code review)
    if: github.actor != 'dependabot[bot]'
    env:
      AST_GREP_MCP_VERSION: "1.1.1"
      MORPH_MCP_VERSION: "0.8.92"
      MGREP_VERSION: "0.1.10"
      CRG_VERSION: "2.3.2"
      SERENA_REF: "7a8b5fb212eecbd5bd1d52c77a5086aee6650cf3"
      # Base tools (mgrep is conditionally added based on MXBAI_API_KEY availability)
      BASE_TOOLS: "Read,Glob,Grep,Task,WebFetch,WebSearch,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
      MGREP_TOOLS: "Bash(mgrep:*)"
      AST_GREP_TOOLS: "mcp__ast-grep__find_code,mcp__ast-grep__find_code_by_rule"
      MORPH_MCP_TOOLS: "mcp__morph-mcp__codebase_search"
      SEMGREP_TOOLS: "mcp__plugin_semgrep_semgrep__semgrep_scan,mcp__plugin_semgrep_semgrep__semgrep_findings,mcp__plugin_semgrep_semgrep__semgrep_scan_with_custom_rule"
      CODE_REVIEW_GRAPH_TOOLS: "mcp__code-review-graph__get_review_context_tool,mcp__code-review-graph__traverse_graph_tool,mcp__code-review-graph__semantic_search_nodes_tool,mcp__code-review-graph__get_impact_radius_tool"
      SERENA_TOOLS: "mcp__serena__find_symbol,mcp__serena__find_referencing_symbols,mcp__serena__get_symbols_overview"
      # Note: search_for_pattern excluded — claude-code context removes it (Claude Code has native pattern search)
      # Note: mgrep is a CLI tool (not MCP), configured separately via npm install
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # Install mgrep CLI for semantic code search (Bash-based, not MCP)
      # MXBAI_API_KEY is passed to Claude Code via settings.env for Bash access
      - name: Install mgrep CLI
        id: install-mgrep
        timeout-minutes: 2
        env:
          HAS_MXBAI_KEY: ${{ secrets.MXBAI_API_KEY != '' }}
        run: |
          set -euo pipefail

          if [ "$HAS_MXBAI_KEY" != "true" ]; then
            echo "::warning::MXBAI_API_KEY not configured. Semantic search will be unavailable."
            echo "mgrep_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔍 Installing @mixedbread/mgrep@${{ env.MGREP_VERSION }}..."
          if npm install -g @mixedbread/mgrep@${{ env.MGREP_VERSION }} 2>&1; then
            echo "✅ mgrep installed: $(mgrep --version)"
            echo "mgrep_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::mgrep installation failed. Semantic search will be unavailable."
            echo "mgrep_available=false" >> "$GITHUB_OUTPUT"
          fi

      # ast-grep MCP availability verification (independent graceful degradation)
      # ast_grep_available controls: ast-grep server in MCP config + AST_GREP_TOOLS
      - name: Verify ast-grep MCP availability
        id: verify-ast-grep
        timeout-minutes: 2
        run: |
          set -euo pipefail

          if ! command -v npm &> /dev/null; then
            echo "::error::npm is not installed. This is unexpected on ubuntu-latest."
            echo "ast_grep_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔍 Verifying @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }}..."
          NPM_OUTPUT=$(npm view @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }} version 2>&1) && NPM_STATUS=0 || NPM_STATUS=$?

          if [ "$NPM_STATUS" -eq 0 ]; then
            echo "✅ ast-grep verified: $NPM_OUTPUT"
            echo "ast_grep_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ast-grep MCP verification failed (exit code: $NPM_STATUS)"
            echo "::warning::npm output: $NPM_OUTPUT"
            echo "::warning::Review will proceed without AST analysis."
            echo "ast_grep_available=false" >> "$GITHUB_OUTPUT"
          fi

      # morph-mcp availability verification (independent graceful degradation)
      # morph_mcp_available controls: morph-mcp server in MCP config + MORPH_MCP_TOOLS
      - name: Verify morph-mcp availability
        id: verify-morph-mcp
        timeout-minutes: 2
        env:
          HAS_MORPH_KEY: ${{ secrets.MORPH_API_KEY != '' }}
        run: |
          set -euo pipefail

          if [ "$HAS_MORPH_KEY" != "true" ]; then
            echo "::warning::MORPH_API_KEY not configured. AI-powered search will be unavailable."
            echo "morph_mcp_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! command -v npm &> /dev/null; then
            echo "::error::npm is not installed. This is unexpected on ubuntu-latest."
            echo "morph_mcp_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔍 Verifying @morphllm/morphmcp@${{ env.MORPH_MCP_VERSION }}..."
          NPM_OUTPUT=$(npm view @morphllm/morphmcp@${{ env.MORPH_MCP_VERSION }} version 2>&1) && NPM_STATUS=0 || NPM_STATUS=$?

          if [ "$NPM_STATUS" -eq 0 ]; then
            echo "✅ morph-mcp verified: $NPM_OUTPUT"
            echo "morph_mcp_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::morph-mcp verification failed (exit code: $NPM_STATUS)"
            echo "::warning::npm output: $NPM_OUTPUT"
            echo "::warning::Review will proceed without AI-powered search."
            echo "morph_mcp_available=false" >> "$GITHUB_OUTPUT"
          fi

      # Install uv: shared Python package runner for code-review-graph and serena
      - name: Install uv
        id: install-uv
        timeout-minutes: 2
        continue-on-error: true
        run: |
          if command -v uv &> /dev/null; then
            echo "✅ uv already available: $(uv --version)"
            echo "uv_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip install uv --quiet && UV_STATUS=0 || UV_STATUS=$?
          if [ "$UV_STATUS" -eq 0 ] && command -v uv &> /dev/null; then
            echo "✅ uv installed: $(uv --version)"
            echo "uv_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::uv installation failed (exit: $UV_STATUS). code-review-graph and serena will be unavailable."
            echo "uv_available=false" >> "$GITHUB_OUTPUT"
          fi

      # Verify semgrep MCP: static analysis tool (no API token required for local SAST)
      - name: Verify semgrep MCP
        id: verify-semgrep
        timeout-minutes: 3
        continue-on-error: true
        run: |
          pip install semgrep --quiet && SEMGREP_STATUS=0 || SEMGREP_STATUS=$?
          if [ "$SEMGREP_STATUS" -eq 0 ] && semgrep --version &> /dev/null; then
            echo "✅ semgrep installed: $(semgrep --version)"
            echo "semgrep_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::semgrep installation failed (exit: $SEMGREP_STATUS). Semgrep MCP will be unavailable."
            echo "semgrep_available=false" >> "$GITHUB_OUTPUT"
          fi

      # Build code-review-graph index for structural code analysis
      # --skip-flows: omit inter-procedure flow analysis for speed
      - name: Build code-review-graph index
        id: build-crg
        timeout-minutes: 4
        continue-on-error: true
        env:
          UV_AVAILABLE: ${{ steps.install-uv.outputs.uv_available }}
        run: |
          set -euo pipefail
          if [ "$UV_AVAILABLE" != "true" ]; then
            echo "::warning::uv not available. Skipping code-review-graph build."
            echo "crg_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [[ -n "${CRG_VERSION}" ]] || { echo "::error::CRG_VERSION is empty"; exit 1; }
          uvx code-review-graph@${CRG_VERSION} build --skip-flows && CRG_STATUS=0 || CRG_STATUS=$?
          if [ "$CRG_STATUS" -eq 0 ]; then
            echo "✅ code-review-graph index built successfully"
            echo "crg_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::code-review-graph build failed (exit: $CRG_STATUS). Graph-based analysis will be unavailable."
            echo "crg_available=false" >> "$GITHUB_OUTPUT"
          fi

      # Verify serena MCP: SERENA_TOOLS allowlist (allowedTools) restricts Claude to read-only tools for CI safety.
      # No context file needed — allowlist operates at Claude Code level (stronger than denylist).
      # Live connectivity probe: validates SERENA_REF reachability + uvx fetch + start-mcp-server subcommand
      # at verify-time instead of waiting for downstream claude-review step to hang on broken install.
      - name: Verify serena MCP
        id: verify-serena
        timeout-minutes: 5
        continue-on-error: true
        env:
          UV_AVAILABLE: ${{ steps.install-uv.outputs.uv_available }}
        run: |
          set -euo pipefail
          if [ "$UV_AVAILABLE" != "true" ]; then
            echo "::warning::uv not available. Skipping serena MCP."
            echo "serena_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [[ -n "${SERENA_REF}" ]] || { echo "::error::SERENA_REF is empty"; exit 1; }
          # Live connectivity probe: uvx fetches git ref, installs deps, dispatches `start-mcp-server` subcommand.
          # Probe matches downstream invocation shape (--context, --project) so CLI option renames surface here,
          # not after 15-min hang in claude-review step.
          # `--help` prevents actual server startup while still parsing click options.
          # Failure modes covered: ref-lost / PyPI outage / subcommand renamed / --context|--project removed.
          SERENA_PROBE_OUTPUT=$(uvx --from "git+https://github.com/oraios/serena@${SERENA_REF}" \
            serena start-mcp-server --context claude-code --project . --help 2>&1) \
            && SERENA_PROBE_STATUS=0 || SERENA_PROBE_STATUS=$?
          if [ "$SERENA_PROBE_STATUS" -ne 0 ]; then
            echo "::warning::serena connectivity probe failed (exit: $SERENA_PROBE_STATUS). Serena MCP will be unavailable."
            echo "::warning::probe output: ${SERENA_PROBE_OUTPUT//$'\n'/%0A}"
            echo "serena_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ serena MCP verified (binary probe passed)"
          echo "serena_available=true" >> "$GITHUB_OUTPUT"

      # Build MCP config dynamically based on individual service availability
      # Each MCP server is independently verified and conditionally included
      # Security: Secrets are passed via env: block (not ${{ secrets.* }} in run:) and
      # JSON is built with jq --arg for safe escaping (prevents JSON injection)
      - name: Build MCP config
        id: build-mcp-config
        env:
          MORPH_API_KEY: ${{ secrets.MORPH_API_KEY }}
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          set -euo pipefail
          AST_GREP='${{ steps.verify-ast-grep.outputs.ast_grep_available }}'
          MORPH_MCP='${{ steps.verify-morph-mcp.outputs.morph_mcp_available }}'
          MGREP='${{ steps.install-mgrep.outputs.mgrep_available }}'
          SEMGREP='${{ steps.verify-semgrep.outputs.semgrep_available }}'
          CRG='${{ steps.build-crg.outputs.crg_available }}'
          SERENA='${{ steps.verify-serena.outputs.serena_available }}'

          EXTRA_TOOLS=""

          # mgrep CLI: semantic code search (Bash tool, not MCP)
          if [ "$MGREP" == "true" ]; then
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.MGREP_TOOLS }}"
            echo "✅ mgrep CLI included in allowedTools"
          fi

          # ast-grep: AST-based code analysis
          AST_GREP_SERVER=""
          if [ "$AST_GREP" == "true" ]; then
            AST_GREP_SERVER='"ast-grep":{"command":"npx","args":["-y","@notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }}"]}'
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.AST_GREP_TOOLS }}"
            echo "✅ ast-grep included in MCP config"
          fi

          # morph-mcp: AI-powered code search
          # Secret is injected via jq (not shell interpolation) for safe JSON escaping
          HAS_MORPH=false
          if [ "$MORPH_MCP" == "true" ]; then
            echo "::add-mask::${MORPH_API_KEY}"
            HAS_MORPH=true
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.MORPH_MCP_TOOLS }}"
            echo "✅ morph-mcp included in MCP config"
          fi

          # semgrep: static analysis (local SAST; Pro rules require SEMGREP_APP_TOKEN)
          if [ "$SEMGREP" == "true" ]; then
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.SEMGREP_TOOLS }}"
            echo "✅ semgrep included in allowedTools"
          fi

          # code-review-graph: structural code analysis via pre-built index
          if [ "$CRG" == "true" ]; then
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.CODE_REVIEW_GRAPH_TOOLS }}"
            echo "✅ code-review-graph included in allowedTools"
          fi

          # serena: semantic code navigation (read-only via SERENA_TOOLS allowlist)
          if [ "$SERENA" == "true" ]; then
            if [ -n "$EXTRA_TOOLS" ]; then EXTRA_TOOLS="$EXTRA_TOOLS,"; fi
            EXTRA_TOOLS="${EXTRA_TOOLS}${{ env.SERENA_TOOLS }}"
            echo "✅ serena included in allowedTools"
          fi

          # Build final config using jq for safe JSON escaping of secret values
          # Note: Uses inline JSON (not file path) for --mcp-config to avoid
          # silent drop issue in claude-code-action (see: anthropics/claude-code-action#1004)
          # Secret masking: ::add-mask:: + env: block ensure secrets are masked in logs
          HAS_SERVERS=false
          if [ -n "$AST_GREP_SERVER" ] || [ "$HAS_MORPH" == "true" ] || [ "$SEMGREP" == "true" ] || [ "$CRG" == "true" ] || [ "$SERENA" == "true" ]; then
            HAS_SERVERS=true
          fi

          if [ "$HAS_SERVERS" == "true" ]; then
            # Use jq to safely build the MCP config JSON
            # This ensures proper escaping of all values (especially secrets)
            BASE_CONFIG='{"mcpServers":{}}'

            if [ -n "$AST_GREP_SERVER" ]; then
              BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c '.mcpServers["ast-grep"] = {"command":"npx","args":["-y","@notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }}"]}')
            fi

            if [ "$HAS_MORPH" == "true" ]; then
              BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c --arg key "$MORPH_API_KEY" '.mcpServers["morph-mcp"] = {"command":"npx","args":["-y","@morphllm/morphmcp@${{ env.MORPH_MCP_VERSION }}"],"env":{"MORPH_API_KEY":$key,"ENABLED_TOOLS":"codebase_search"}}')
            fi

            if [ "$SEMGREP" == "true" ]; then
              if [ -n "$SEMGREP_APP_TOKEN" ]; then
                echo "::add-mask::${SEMGREP_APP_TOKEN}"
                BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c --arg token "$SEMGREP_APP_TOKEN" '.mcpServers["plugin_semgrep_semgrep"] = {"command":"semgrep","args":["mcp"],"env":{"SEMGREP_APP_TOKEN":$token}}')
              else
                BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c '.mcpServers["plugin_semgrep_semgrep"] = {"command":"semgrep","args":["mcp"]}')
              fi
            fi

            if [ "$CRG" == "true" ]; then
              [[ -n "${CRG_VERSION}" ]] || { echo "::error::CRG_VERSION is empty"; exit 1; }
              BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c --arg crg "code-review-graph@${CRG_VERSION}" '.mcpServers["code-review-graph"] = {"command":"uvx","args":[$crg,"serve"]}')
            fi

            if [ "$SERENA" == "true" ]; then
              [[ -n "${SERENA_REF}" ]] || { echo "::error::SERENA_REF is empty"; exit 1; }
              BASE_CONFIG=$(echo "$BASE_CONFIG" | jq -c --arg ref "${SERENA_REF}" '.mcpServers["serena"] = {"command":"uvx","args":["--from","git+https://github.com/oraios/serena@"+$ref,"serena","start-mcp-server","--context","claude-code","--project","."]}')
            fi

            # Write inline JSON to GITHUB_OUTPUT (not file path)
            echo "mcp_config=${BASE_CONFIG}" >> "$GITHUB_OUTPUT"
            echo "extra_tools=${EXTRA_TOOLS}" >> "$GITHUB_OUTPUT"
            echo "has_mcp=true" >> "$GITHUB_OUTPUT"
          else
            # mgrep is CLI-only (no MCP server), so has_mcp may be false even with mgrep available
            echo "mcp_config=" >> "$GITHUB_OUTPUT"
            echo "extra_tools=${EXTRA_TOOLS}" >> "$GITHUB_OUTPUT"
            if [ -n "$EXTRA_TOOLS" ]; then
              echo "has_mcp=false" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::No MCP servers or CLI tools available. Review with BASE_TOOLS only."
              echo "has_mcp=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "📋 Summary: ast-grep=$AST_GREP, morph-mcp=$MORPH_MCP, mgrep=$MGREP, semgrep=$SEMGREP, crg=$CRG, serena=$SERENA"

      # Build settings JSON with jq for safe JSON escaping of secret values
      # Prevents JSON injection if API key contains special characters (e.g., double quotes)
      - name: Build settings JSON
        id: build-settings
        env:
          MXBAI_API_KEY: ${{ secrets.MXBAI_API_KEY }}
          MGREP_AVAILABLE: ${{ steps.install-mgrep.outputs.mgrep_available }}
        run: |
          if [ "$MGREP_AVAILABLE" == "true" ]; then
            echo "::add-mask::${MXBAI_API_KEY}"
            # Use jq to safely escape the API key value in JSON
            SETTINGS_JSON=$(jq -cn --arg key "$MXBAI_API_KEY" '{"env": {"MXBAI_API_KEY": $key}}')
          else
            SETTINGS_JSON='{"env": {}}'
          fi
          echo "settings_json=${SETTINGS_JSON}" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        # NOTE: Workflow fails if this step fails (default behavior)
        # Claude Action errors (auth, timeout, rate limit) propagate automatically
        id: claude-review
        timeout-minutes: 15  # Step-level limit (primary boundary per GitHub Actions evaluation order)
                            # GitHub Actions: step timeout checked BEFORE job timeout
                            # Process: MCP servers (ast-grep/morph-mcp via npx) + PR diff + code analysis + Japanese comments
        # Pin to v1.0.66 (2026-03-02) to avoid AJV schema validation crash in v1.0.67+
        # See: https://github.com/anthropics/claude-code-action/issues/1013
        # TODO: Update when upstream fix is released
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Security: settings JSON is built in build-settings step using jq for safe
          # JSON escaping (prevents JSON injection if key contains special characters)
          settings: ${{ steps.build-settings.outputs.settings_json }}
          # MCP config: dynamically built based on individual service availability
          # When no MCP servers available: Claude proceeds with BASE_TOOLS only
          # Single-line format to avoid multiline parsing issues (see: anthropics/claude-code-action#844)
          claude_args: >-
            ${{ steps.build-mcp-config.outputs.has_mcp == 'true' && format('--mcp-config {0}', steps.build-mcp-config.outputs.mcp_config) || '' }}
            --allowedTools "${{ env.BASE_TOOLS }}${{ steps.build-mcp-config.outputs.extra_tools != '' && format(',{0}', steps.build-mcp-config.outputs.extra_tools) || '' }}"
            --model "claude-sonnet-4-6"
          prompt: |
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}

            重要: レビュー結果は必ず日本語で出力してください。
            - 問題点の説明は日本語
            - 推奨修正も日本語
            - コード例のコメントも日本語
