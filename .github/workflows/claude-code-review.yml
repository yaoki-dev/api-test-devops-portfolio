name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # All PRs (Max 200 plan - no cost concern)

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Job-level timeout to prevent runaway jobs
    # Skip for Dependabot PRs (package updates don't need code review)
    if: github.actor != 'dependabot[bot]'
    env:
      AST_GREP_MCP_VERSION: "1.1.1"
      BASE_TOOLS: "Read,Glob,Grep,Task,WebFetch,WebSearch,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
      AST_GREP_TOOLS: ",mcp__ast-grep__find_code,mcp__ast-grep__find_code_by_rule"
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ast-grep MCP availability verification (graceful degradation)
      # mcp_available controls: --mcp-config injection + allowedTools list; when false, review proceeds without AST analysis
      - name: Verify ast-grep MCP availability
        id: verify-mcp
        timeout-minutes: 2
        run: |
          set -euo pipefail

          # npm可用性チェック（Medium問題対応）
          if ! command -v npm &> /dev/null; then
            echo "::warning::npm not installed. Skipping MCP verification."
            echo "mcp_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔍 Verifying @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }} availability..."
          if npm view @notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }} version > /dev/null 2>&1; then
            echo "✅ Package verified"
            echo "mcp_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ast-grep MCP package unavailable. Review will proceed without AST analysis."
            echo "mcp_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        # NOTE: Workflow fails if this step fails (default behavior)
        # Claude Action errors (auth, timeout, rate limit) propagate automatically
        id: claude-review
        timeout-minutes: 10
        env:
          MCP_CONFIG: '{"mcpServers": {"ast-grep": {"command": "npx", "args": ["-y", "@notprolands/ast-grep-mcp@${{ env.AST_GREP_MCP_VERSION }}"]}}}'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            ${{ steps.verify-mcp.outputs.mcp_available == 'true' && format('--mcp-config {0}', env.MCP_CONFIG) || '' }}
            --allowedTools "${{ env.BASE_TOOLS }}${{ steps.verify-mcp.outputs.mcp_available == 'true' && env.AST_GREP_TOOLS || '' }}"
          prompt: |
            /review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}

            重要: レビュー結果は必ず日本語で出力してください。
            - 問題点の説明は日本語
            - 推奨修正も日本語
            - コード例のコメントも日本語
