# Markdown Link Check Workflow
# Validates internal and external links in all markdown files
# Runs on PR (markdown changes), weekly schedule, and manual dispatch

name: Markdown Link Check

on:
  pull_request:
    paths:
      - '**.md'
  schedule:
    # 毎週日曜日 00:00 UTC (日本時間 09:00)
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdown link check
        run: npm run lint:links
        continue-on-error: ${{ github.event_name == 'schedule' }}

      - name: Run verbose check on failure (debug)
        if: failure()
        run: npm run lint:links:verbose || true
