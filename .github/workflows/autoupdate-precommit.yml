# .github/workflows/autoupdate-precommit.yml
name: Update pre-commit hooks

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 00:00 UTC
  workflow_dispatch:      # 手動実行可能

permissions:
  contents: write
  pull-requests: write

jobs:
  update-precommit:
    name: Update pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Update pre-commit hooks
        run: |
          pip install pre-commit
          pre-commit autoupdate --freeze

      # gitleaksインストール（pre-commit language: system用）
      # NOTE: .pre-commit-config.yamlでlanguage: systemを使用しているため
      # CI環境では明示的にgitleaksバイナリをインストールする必要がある
      # gh CLIで最新版を動的取得（手動更新不要、認証済みでRate Limit緩和）
      - name: Install gitleaks (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          gh release download --repo gitleaks/gitleaks --pattern "gitleaks_*_linux_x64.tar.gz" --clobber
          tar -xzf gitleaks_*_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
          rm -rf "$TEMP_DIR"

      # Fail Fast: 壊れたフックでPR作成を防止（早期検出でデバッグ時間節約）
      - name: Verify updated hooks
        run: pre-commit run --all-files
        continue-on-error: false

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet .pre-commit-config.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # NOTE: 企業環境ではSHA pinning推奨（例: @67ccf781d68cd99b580ae25a5c18a1cc84ffff1f）
      # ポートフォリオではメジャーバージョンタグで保守性とセキュリティをバランス
      - name: Create Pull Request
        id: create-pr
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update pre-commit hooks"
          title: "chore(deps): update pre-commit hooks"
          body: |
            ## Automated pre-commit hooks update
            
            Updated by `pre-commit autoupdate --freeze`.
            
            ### Verification
            ```bash
            pre-commit run --all-files
            ```
          branch: chore/update-precommit-hooks
          labels: |
            dependencies
            pre-commit
          delete-branch: true

      - name: Verify pull request output
        if: steps.git-check.outputs.changed == 'true'
        env:
          PULL_REQUEST_OPERATION: ${{ steps.create-pr.outputs.pull-request-operation }}
          PULL_REQUEST_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          case "$PULL_REQUEST_OPERATION" in
            created|updated)
              if [ -z "$PULL_REQUEST_URL" ]; then
                echo "::error::pull-request-operation='${PULL_REQUEST_OPERATION}' but pull-request-url is empty" >&2
                exit 1
              fi
              echo "Pull request ${PULL_REQUEST_OPERATION}: ${PULL_REQUEST_URL}"
              ;;
            closed)
              echo "::error::Create Pull Request step closed the pull request (url=${PULL_REQUEST_URL})" >&2
              exit 1
              ;;
            none)
              echo "Create Pull Request step reported no pull request changes (operation=none)"
              exit 0
              ;;
            "")
              echo "::error::Create Pull Request step did not produce pull-request-operation output (step may have failed)" >&2
              exit 1
              ;;
            *)
              echo "::error::Unexpected pull-request-operation value: '${PULL_REQUEST_OPERATION}'" >&2
              exit 1
              ;;
          esac
