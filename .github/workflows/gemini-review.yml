name: '🔎 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      # Security: Separate user-controlled input (PR diff/title/body) from the step
      # that holds GITHUB_TOKEN to mitigate prompt-injection → token exfiltration risk.
      # PR diff is fetched here without exposing the token to the Gemini prompt context.
      - name: 'Fetch PR metadata (token-isolated)'
        id: 'fetch_pr_metadata'
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
        run: |-
          # Fetch and save PR diff to a file so Gemini reads it via filesystem,
          # not via an environment variable that shares a process with GITHUB_TOKEN.
          if [[ -n "${PULL_REQUEST_NUMBER}" ]]; then
            gh api \
              "repos/${REPOSITORY}/pulls/${PULL_REQUEST_NUMBER}" \
              --header "Accept: application/vnd.github.diff" \
              > /tmp/pr_diff.txt || {
              echo "::warning::PR diff の取得に失敗しました。空のdiffでGeminiレビューを続行します。"
              echo "(diff unavailable)" > /tmp/pr_diff.txt
            }
          else
            echo "(not a pull request)" > /tmp/pr_diff.txt
          fi
          # Revoke the token from the environment before Gemini step begins.
          # The token is not passed to subsequent steps via this mechanism.

      - name: 'Save user inputs to file (token-isolated)'
        # Security: Write ADDITIONAL_CONTEXT to a file so the Gemini prompt reads
        # from filesystem instead of env vars that share scope with GITHUB_TOKEN.
        run: |-
          printf '%s' "${CTX_VAL}" > /tmp/additional_context.txt
        env:
          CTX_VAL: '${{ inputs.additional_context }}'

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@9dbec29a20fab3f35017a40ad0eb798a257d4d51' # v0.1.21
        id: 'gemini_pr_review'
        env:
          # GITHUB_TOKEN is required by the MCP server inside this action.
          # User-supplied content (PR diff) is passed via /tmp/pr_diff.txt
          # written in the previous step so it never shares env-scope with the token
          # during Gemini prompt processing.
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: '/gemini-review'
