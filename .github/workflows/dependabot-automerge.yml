# Dependabot auto-merge workflow
# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions
#
# Design Decision (Git Flow + Enterprise Best Practice):
# - Auto-merge ONLY on develop branch (not main)
# - patch/minor updates only (low risk)
# - Indirect dependencies in groups also auto-merged (uv lockfile updates)
# - Major updates require manual review (breaking changes)
# - main branch requires manual PR + human review (release process)
# - This prevents supply chain attacks from directly affecting production
#
# Reference: https://blog.somewhatabstract.com/2021/10/11/setting-up-dependabot-with-github-actions-to-approve-and-merge/

name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only auto-merge on develop branch (Git Flow compliance)
    # main branch PRs require manual review for security
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge (patch/minor/docker)
        # NOTE: fetch-metadata returns null update-type for uv group updates (upstream limitation)
        # See: https://github.com/dependabot/fetch-metadata/issues/499
        # Workaround: Allow indirect dependencies in groups, but explicitly block major updates
        #
        # Docker ecosystem support (2026-02-13追加):
        #
        # トリガー条件:
        # - Dependabotがdocker ecosystemのSHA256更新を検出（週次月曜09:00 JST）
        # - dependabot.yml L103設定により'docker'ラベルを自動付与
        # - 下記条件: 'docker'ラベル AND package-ecosystem=='docker' でマッチ
        #
        # セーフガード（4層防御）:
        # 1. Tag固定: python:3.13-slim（major変更はタグ変更必須→手動レビュー）
        # 2. package-ecosystem検証: fetch-metadataの出力で'docker'エコシステム限定
        #    （'docker'ラベルの誤付与・手動付与によるsemver制約バイパスを防止）
        # 3. Trivy scan: CRITICAL/HIGH脆弱性検出時は自動マージブロック（CI必須）
        # 4. pytest実行: アプリロジック検証（httpx, Pydantic, structlog等）
        #
        # Risk assessment: Low-Medium
        # 軽減策: develop-only（本番直撃なし）、CI必須、squash merge（1コマンドrevert可能）
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          (steps.metadata.outputs.dependency-type == 'indirect' &&
           steps.metadata.outputs.dependency-group != '' &&
           steps.metadata.outputs.update-type != 'version-update:semver-major') ||
          (contains(github.event.pull_request.labels.*.name, 'docker') &&
           steps.metadata.outputs.package-ecosystem == 'docker')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
