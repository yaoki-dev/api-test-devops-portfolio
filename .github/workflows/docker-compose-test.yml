name: Docker Compose Verification

# docker-compose.yml の動作検証:
#   1) test profile で pytest を実行しカバレッジ成果物を生成
#   2) app(runtime) を起動し HEALTHCHECK が healthy に遷移することを確認
# 既存 ci.yml と独立。compose の破壊的変更を PR 段階で検知。

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-test:
    name: Compose test profile (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate compose config
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: test
          tags: api-test:test
          load: true
          # load: true時の manifest unknown エラー回避
          provenance: false
          cache-from: type=gha,scope=compose-test
          cache-to: type=gha,mode=max,scope=compose-test

      - name: Prepare reports dir (bind-mount uid mismatch回避)
        # CI runner (uid=1001) と container appuser (uid=1000) の uid 不整合で
        # bind mount への書込が EACCES になるのを回避。CI環境は ephemeral のため 777 で問題なし。
        run: |
          mkdir -p reports
          chmod 777 reports

      - name: Run pytest in test container
        run: docker compose --profile test run --rm test

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: reports/
          if-no-files-found: error
          retention-days: 14

  compose-healthcheck:
    name: Compose app healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate compose config
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build app(runtime) image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: runtime
          tags: api-test:runtime
          load: true
          # load: true時の manifest unknown エラー回避 (compose-test job と対称)
          provenance: false
          cache-from: type=gha,scope=compose-runtime
          cache-to: type=gha,mode=max,scope=compose-runtime

      - name: Start app and wait for healthy
        # Docker Compose 2.2 以降のネイティブ機能に置き換え
        # タイムアウト根拠: start-period(5s) + interval(30s) * retries(3) = 95s。余裕を持たせて120sに設定。
        run: docker compose up -d --wait --wait-timeout 120 app

      - name: Compose ps (diagnostic)
        if: failure()
        # CIのログ肥大化を防ぐため、直近200行のみ抽出
        run: |
          docker compose ps
          docker compose logs --tail=200 app

      - name: Tear down
        if: always()
        run: docker compose down --remove-orphans
