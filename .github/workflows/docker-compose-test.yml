name: Docker Compose Verification

# docker-compose.yml の動作検証:
#   1) test profile で pytest を実行しカバレッジ成果物を生成
#   2) app(runtime) を起動し HEALTHCHECK が healthy に遷移することを確認
# 既存 ci.yml と独立。compose の破壊的変更を PR 段階で検知。

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-test:
    name: Compose test profile (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: test
          tags: api-test:test
          load: true
          # load: true時の manifest unknown エラー回避
          provenance: false
          cache-from: type=gha,scope=compose-test
          # PR時の cache poisoning 防止: cache-to は develop/main push時のみ書込
          # (compose-healthcheck ジョブ・ci.yml と同方針で統一)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=compose-test' || '' }}

      - name: Prepare reports dir (bind-mount uid mismatch回避)
        # CI runner (uid=1001) と container appuser (uid=1000) の uid 不整合で
        # bind mount への書込が EACCES になるのを回避。CI環境は ephemeral のため 777 で問題なし。
        run: |
          mkdir -p reports
          chmod 777 reports

      - name: Run pytest in test container
        run: docker compose --profile test run --rm test

      - name: Show test container logs on failure
        if: failure()
        run: docker compose logs --tail=1000 test || true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down
        if: always()
        # compose-test ジョブは `--rm` で container は自動削除されるが network/volume は残存しうる。
        # compose-healthcheck ジョブと対称化して明示 cleanup (過去レビュー #3292029073 対応)。
        # シェル優先度バグ回避のためブロック化、teardown失敗は warning のみで継続。
        # ephemeral runner (ubuntu-latest は VM ごと破棄) のため teardown 失敗は次回 CI に影響しない。
        run: docker compose down --remove-orphans --timeout=10 || { echo "::warning::docker compose down failed"; true; }

  compose-healthcheck:
    needs: [compose-test]
    name: Compose app healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build app(runtime) image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: runtime
          tags: api-test:runtime
          load: true
          # load: true時の manifest unknown エラー回避 (compose-test job と対称)
          provenance: false
          # ci.yml の runtime キャッシュを読む。healthcheck 専用scopeも読み書きして、
          # PR時の cache poisoning と ci.yml との同一scope競合を避ける。
          cache-from: |
            type=gha,scope=api-test-runtime
            type=gha,scope=compose-healthcheck-runtime
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=compose-healthcheck-runtime' || '' }}

      - name: Start app and wait for healthy
        # Docker Compose 2.2 以降のネイティブ機能に置き換え
        # タイムアウト根拠: start-period(5s) + interval(30s) × retries(3) + timeout(10s) = 105s。余裕を持たせて120sに設定。
        run: docker compose up -d --wait --wait-timeout 120 app

      - name: Compose ps (diagnostic)
        if: failure()
        # restart: on-failure による再起動ループ時の根本原因切れ防止のため --tail=1000 に拡張
        # (200行では複数試行ログ混在で初期スタックトレースが切れる可能性あり)
        run: |
          docker compose ps
          docker compose logs --tail=1000 app

      - name: Tear down
        if: always()
        # 0. ephemeral runner (ubuntu-latest は VM ごと破棄) のため teardown 失敗は次回 CI に影響しない
        # 1. --timeout=10: コンテナ停止猶予秒数 (SIGTERMからSIGKILLまで。デフォルト10秒)
        # 2. ブロック化 `|| { ... ; }`: シェル優先度 `(A || B) ; true` バグ修正
        #    旧: `|| echo ... ; true` は `; true` が `||` リスト外で常時実行 = dead code
        #    新: `|| { echo ... ; true; }` で echo + true をブロック内一括実行 (teardown失敗時のみ)
        # 3. exit 0 維持 — teardown failure はwarning通知のみで後続ジョブをブロックしない
        run: docker compose down --remove-orphans --timeout=10 || { echo "::warning::docker compose down failed"; true; }
