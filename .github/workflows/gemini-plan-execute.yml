name: '🧙 Gemini Plan Execution'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

concurrency:
  group: '${{ github.workflow }}-plan-execute-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  plan-execute:
    timeout-minutes: 30
    runs-on: 'ubuntu-latest'
    # SECURITY NOTE: `contents: write` is required for this workflow to create branches
    # and commit files via the GitHub MCP server tools (create_branch, create_or_update_file).
    # Combined with prompt injection risk from user-supplied issue/PR content and the
    # code-change tooling available to Gemini, this creates an elevated risk surface.
    # Mitigations applied:
    #   1. Dispatch gate (gemini-dispatch.yml) restricts triggering to OWNER/MEMBER/COLLABORATOR.
    #   2. The plan-execute prompt requires a pre-approved 'AI Assistant: Plan of Action'
    #      comment before taking any action.
    #   3. User-supplied variables ($TITLE, $DESCRIPTION) are wrapped in boundary markers
    #      in the prompt template to reduce prompt injection surface.
    # Recommendation: further restrict write access or add branch protection rules.
    permissions:
      contents: 'write'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'

    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'write'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout Code'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # ratchet:actions/checkout@v6.0.2

      - name: 'Save user inputs to file (token-isolated)'
        # Security: Write user-controlled input (title/body/context) to files so
        # the Gemini prompt can read from filesystem instead of environment variables
        # that share process scope with GITHUB_TOKEN. This mitigates the
        # prompt-injection → token exfiltration attack vector.
        run: |-
          printf '%s' "${TITLE_VAL}" > /tmp/title.txt
          printf '%s' "${DESC_VAL}" > /tmp/description.txt
          printf '%s' "${CTX_VAL}" > /tmp/additional_context.txt
        env:
          TITLE_VAL: '${{ github.event.pull_request.title || github.event.issue.title }}'
          DESC_VAL: '${{ github.event.pull_request.body || github.event.issue.body }}'
          CTX_VAL: '${{ inputs.additional_context }}'

      - name: 'Run Gemini CLI'
        id: 'run_gemini'
        # SECURITY NOTE: This action uses a floating tag (@v0) which is a supply chain risk.
        # A compromised upstream tag could execute arbitrary code in this workflow
        # (which has contents: write permission).
        # Pinned to v0.1.21 SHA for supply chain security.
        # To update: gh api repos/google-github-actions/run-gemini-cli/git/refs/tags/v0 --jq '.object.sha'
        uses: 'google-github-actions/run-gemini-cli@9dbec29a20fab3f35017a40ad0eb798a257d4d51' # v0.1.21
        env:
          EVENT_NAME: '${{ github.event_name }}'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          IS_PULL_REQUEST: '${{ !!github.event.pull_request }}'
          ISSUE_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-plan-execute'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_issue_comment",
                    "issue_read",
                    "list_issues",
                    "search_issues",
                    "create_pull_request",
                    "pull_request_read",
                    "list_pull_requests",
                    "search_pull_requests",
                    "create_branch",
                    "create_or_update_file",
                    "get_commit",
                    "get_file_contents",
                    "list_commits",
                    "search_code"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: '/gemini-plan-execute'
