# Main to Develop Branch Sync Workflow
# Automatically creates a PR to sync main changes back to develop after release merges
# Maintains Git Flow branch synchronization without manual intervention
#
# Trigger: Push to main (typically after release PR merge)
# Action: Creates PR from main → develop (if not already exists)
# Merge: MUST use Regular Merge (Squash prohibited per CLAUDE.md:833-841)

name: Sync main to develop

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing sync PR
        id: check
        run: |
          EXISTING=$(gh pr list --base develop --head main --state open --json number -q '.[0].number')
          echo "existing_pr=$EXISTING" >> $GITHUB_OUTPUT
          if [ -n "$EXISTING" ]; then
            echo "::notice::Sync PR #$EXISTING already exists, skipping creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create sync PR
        if: steps.check.outputs.existing_pr == ''
        run: |
          gh pr create --base develop --head main \
            --title "sync: main → develop 自動同期" \
            --body "## 自動同期PR

          main ブランチの変更を develop に同期します。

          ### マージ方式
          **Regular Merge 必須**（Squash 禁止）

          > ⚠️ Squash Merge を使用すると履歴が分断され、
          > 次回の逆方向 PR でコンフリクトが発生します。

          ### 変更内容
          このPRには以下が含まれます：
          - リリースマージコミット
          - hotfix（該当する場合）

          ---
          *Generated by [sync-main-to-develop.yml](/.github/workflows/sync-main-to-develop.yml)*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ -n "${{ steps.check.outputs.existing_pr }}" ]; then
            echo "### ⏭️ Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Sync PR #${{ steps.check.outputs.existing_pr }} already exists" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Created" >> $GITHUB_STEP_SUMMARY
            echo "New sync PR created from main → develop" >> $GITHUB_STEP_SUMMARY
          fi
