name: CI/CD Pipeline - 4-Tier Test Pyramid

# Test Pyramid Strategy (Google Testing Blog):
#   Unit 70% / Integration 25% / E2E 5%
# Coverage Target: 85% (baseline protection, dynamic targets in local dev)
# Reference: .serena/memories/test_strategy_part1_overview.md

# Default permissions (least privilege principle)
# security-events: write is granted at job level where needed
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly (Sunday 00:00 UTC)

jobs:
  # ============================================================
  # Stage 1: PR Validation
  # Triggers: pull_request
  # Tests: Unit + Integration (with coverage) → Smoke (no coverage)
  # Scope: develop/main PRs use identical strategy (PR #116)
  # ============================================================
  pr-validation:
    name: PR Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 単一Python版（3.12固定、Dockerfile一致）
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Set test markers
        id: markers
        run: |
          echo "smoke_marker=smoke and not external" >> $GITHUB_OUTPUT
          echo "value=(unit or integration) and not external" >> $GITHUB_OUTPUT
          echo "🎯 PR Validation: Unit + Integration (with coverage) → Smoke (no coverage)"

      - name: Run tests (unit + integration + smoke)
        run: |
          mkdir -p reports
          # Step 1: unit + integration with coverage
          uv run pytest -n auto -m "${{ steps.markers.outputs.value }}" \
            --cov=utils --cov=config --cov=models \
            --cov-report=json:coverage.json \
            --cov-report=term-missing \
            -v --tb=short
          # Step 2: smoke without coverage (using output variable)
          uv run pytest -m "${{ steps.markers.outputs.smoke_marker }}" -v --tb=short --no-cov

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr-validation-results-py${{ matrix.python-version }}
          path: |
            reports/
            coverage.json
          if-no-files-found: warn

  # ============================================================
  # Stage 1.1: Markdown Quality Check
  # Triggers: pull_request
  # Checks: markdownlint, textlint (日本語対応)
  # ============================================================
  md-quality:
    name: Markdown Quality Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        id: markdownlint
        run: npx markdownlint '**/*.md' --ignore node_modules --ignore .venv --ignore .worktrees
        continue-on-error: true

      - name: Run textlint
        id: textlint
        run: npx textlint '**/*.md' --ignore-path .textlintignore
        continue-on-error: true

      - name: Check lint results
        if: steps.markdownlint.outcome == 'failure' || steps.textlint.outcome == 'failure'
        run: |
          echo "::error::Markdown quality check failed"
          echo "markdownlint: ${{ steps.markdownlint.outcome }}"
          echo "textlint: ${{ steps.textlint.outcome }}"
          exit 1

  # NOTE: post-merge-validation uses Python 3.12 only (matches Dockerfile)

  # ============================================================
  # Stage 1.5: PR Security Scan
  # Triggers: pull_request (develop, main)
  # Strategy:
  #   - develop: trivy fs only (fast, no Docker build)
  #   - main: trivy fs + trivy image (comprehensive)
  # Format: SARIF (error differentiation + GitHub Security tab integration)
  # Error Handling: Differentiates security findings vs infrastructure errors
  # ============================================================
  pr-security-scan:
    name: PR Security Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Explicit permissions (security hardening)
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 1: Filesystem scan (both develop and main)
      - name: Trivy filesystem scan (dependencies)
        id: fs-scan
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          cache: 'false'
        continue-on-error: true

      - name: Verify filesystem scan execution
        id: verify-fs-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-fs-scan.sarif'
          scan-type: 'filesystem'

      - name: Upload filesystem scan results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.verify-fs-scan.outcome == 'success' && steps.fs-scan.conclusion != 'cancelled' && steps.fs-scan.conclusion != 'skipped'
        with:
          sarif_file: 'trivy-fs-scan.sarif'
          category: 'trivy-pr-fs-scan'

      - name: Fail job if vulnerabilities found or verification failed
        if: steps.fs-scan.outcome == 'failure' || steps.verify-fs-scan.outcome == 'failure'
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-fs-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.fs-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が dependencies で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、依存関係を更新してください"
          fi
          exit 1

      # Step 2: Build Docker image (main PRs only)
      - name: Build Docker image for scanning
        id: docker-build
        if: github.base_ref == 'main'
        run: |
          if ! docker build -t security-scan:${{ github.sha }} --target runtime .; then
            echo "::error::Docker build failed"
            exit 1
          fi

      # Step 3: Docker image scan (main PRs only - comprehensive security)
      - name: Trivy image scan (main PRs only)
        id: image-scan
        if: github.base_ref == 'main' && steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: 'security-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          cache: 'false'
        continue-on-error: true

      - name: Verify image scan execution
        id: verify-image-scan
        if: always() && steps.image-scan.conclusion != 'skipped'
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-image-scan.sarif'
          scan-type: 'image'

      - name: Upload image scan results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && github.base_ref == 'main' && steps.verify-image-scan.outcome == 'success' && steps.image-scan.conclusion != 'cancelled' && steps.image-scan.conclusion != 'skipped'
        with:
          sarif_file: 'trivy-image-scan.sarif'
          category: 'trivy-pr-image-scan'

      - name: Fail job if vulnerabilities found or verification failed
        if: steps.image-scan.outcome == 'failure' || steps.verify-image-scan.outcome == 'failure'
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-image-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.image-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      # Step 4: Cleanup Docker image (resource hygiene)
      - name: Clean up Docker image
        if: always() && github.base_ref == 'main'
        run: docker rmi security-scan:${{ github.sha }} || true
  # ============================================================
  # Stage 2: Post-Merge Validation
  # Triggers: push to main
  # Tests: Smoke + e2e
  # ============================================================
  post-merge-validation:
    name: Post-Merge Validation (Trivy + Smoke + e2e)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Docker Build + Trivy追加のため5→8分に変更
    # Explicit permissions for Trivy SARIF upload (security hardening)
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image-tag
        run: echo "tag=myapp:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build production Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          tags: ${{ steps.image-tag.outputs.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (CRITICAL + HIGH)
        id: trivy-scan
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: ${{ steps.image-tag.outputs.tag }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          cache: 'false'
        continue-on-error: true

      - name: Verify Trivy scan execution
        id: verify-trivy-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-results.sarif'
          scan-type: 'image'

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.verify-trivy-scan.outcome == 'success'
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-post-merge'

      - name: Fail job if vulnerabilities found or verification failed
        if: steps.trivy-scan.outcome == 'failure' || steps.verify-trivy-scan.outcome == 'failure'
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-trivy-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.trivy-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      - name: Run smoke tests (post-merge validation)
        if: always()
        run: |
          uv run pytest -m "smoke" -v --tb=short --no-cov
        env:
          ENVIRONMENT: testing

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: post-merge-results
          path: reports/

  # ============================================================
  # Stage 3: Weekly Comprehensive Tests (< 30 min)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Tests: Performance + External API + Full Coverage
  # Note: Security は PR 毎の静的解析（gitleaks, bandit, ruff(S)）で代用
  # ============================================================
  weekly-comprehensive:
    name: Weekly Comprehensive
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Run performance tests
        run: |
          uv run pytest -m "performance" -v
          echo "performance_tests_passed=true" >> $GITHUB_ENV

      - name: Run external API tests (Weekly validation)
        id: external-tests  # Used for outcome-based error handling
        run: |
          uv run pytest -m "external" -v --maxfail=5
        continue-on-error: true

      - name: Report external test status (Failure)
        if: steps.external-tests.outcome == 'failure'
        run: echo "::warning::External API tests failed - investigate rate limits or API changes"

      - name: Report external test status (Success)
        if: steps.external-tests.outcome == 'success'
        run: echo "::notice::External API tests passed - all integrations healthy"

      - name: Full coverage report
        # ALL 7 markers: unit/integration/smoke/e2e/performance/slow/external (no -m filter)
        run: |
          uv run pytest --cov=. --cov-report=html:reports/htmlcov --cov-report=json -v
          echo "coverage_report_generated=true" >> $GITHUB_ENV

      - name: Upload weekly test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: weekly-comprehensive-results-py${{ matrix.python-version }}
          path: |
            reports/
            coverage.json

  # ============================================================
  # Stage 3.5: Weekly Link Check
  # Triggers: schedule (Sunday 00:00 UTC)
  # Checks: markdown-link-check (external/internal links)
  # ============================================================
  weekly-link-check:
    name: Weekly Link Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find Markdown files
        id: find-md
        run: |
          # Find MD files, excluding ignored directories (sync with .textlintignore)
          find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.venv/*' \
            -not -path './.worktrees/*' \
            -not -path './docs/archive/*' \
            -not -path './docs/coverage/*' \
            -not -path './docs/main/6週プラン/*' \
            -not -path './docs/main/learning/*' \
            -not -path './docs/main/Skills作成/*' \
            -not -path './docs/ai_collaboration/*' \
            -not -path './docs/tools/*' \
            -not -path './reports/*' \
            -not -path './.taskmaster/*' \
            -not -path './.spec-workflow/*' \
            -not -path './obsidian-vault-local/*' \
            -type f > md_files.txt
          echo "Found $(wc -l < md_files.txt) Markdown files"

      - name: Run markdown-link-check
        run: |
          # Security: Use -print0/xargs -0 to safely handle filenames with special characters
          # Performance note: Sequential execution chosen for weekly job (batch mode would fail-fast on first error)
          echo "# Link Check Results - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > link-check-results.log

          check_file() {
            local file="$1"
            echo "Checking: $file"
            echo "## $file" >> link-check-results.log
            npx markdown-link-check "$file" --config .markdown-link-check.json 2>&1 | tee -a link-check-results.log || true
            echo "" >> link-check-results.log
          }
          export -f check_file

          # -print0 + xargs -0: Null-terminated paths prevent command injection
          find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.venv/*' \
            -not -path './.worktrees/*' \
            -not -path './docs/archive/*' \
            -not -path './docs/coverage/*' \
            -not -path './docs/main/6週プラン/*' \
            -not -path './docs/main/learning/*' \
            -not -path './docs/main/Skills作成/*' \
            -not -path './docs/ai_collaboration/*' \
            -not -path './docs/tools/*' \
            -not -path './reports/*' \
            -not -path './.taskmaster/*' \
            -not -path './.spec-workflow/*' \
            -not -path './obsidian-vault-local/*' \
            -type f -print0 | xargs -0 -I {} bash -c 'check_file "$@"' _ {}
        continue-on-error: true

      - name: Upload link check results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: link-check-results
          path: |
            md_files.txt
            link-check-results.log

  # ============================================================
  # Status Report (Summary for all pipeline stages)
  # ============================================================
  status-report:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    # Note: Skipped jobs are treated as 'success' by GitHub Actions
    # !cancelled() overrides implicit success() check, allowing execution after success/failure/skipped
    needs: [pr-validation, pr-security-scan, md-quality, post-merge-validation, weekly-comprehensive, weekly-link-check]
    if: "!cancelled()"
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate status report
        run: |
          echo "# CI/CD Pipeline Status Report (4-Tier Test Pyramid)" > status_report.md
          echo "" >> status_report.md
          echo "## Test Pyramid Strategy" >> status_report.md
          echo "- Unit 70% / Integration 25% / E2E 5%" >> status_report.md
          echo "- Coverage Target: 85% (baseline protection)" >> status_report.md
          echo "" >> status_report.md
          echo "## Stage Results" >> status_report.md
          echo "- PR Validation: ${{ needs.pr-validation.result || 'skipped' }}" >> status_report.md
          echo "- PR Security Scan: ${{ needs.pr-security-scan.result || 'skipped' }}" >> status_report.md
          echo "- MD Quality: ${{ needs.md-quality.result || 'skipped' }}" >> status_report.md
          echo "- Post-Merge: ${{ needs.post-merge-validation.result || 'skipped' }}" >> status_report.md
          echo "- Weekly Comprehensive: ${{ needs.weekly-comprehensive.result || 'skipped' }}" >> status_report.md
          echo "- Weekly Link Check: ${{ needs.weekly-link-check.result || 'skipped' }}" >> status_report.md
          echo "" >> status_report.md
          echo "## Triggered By: ${{ github.event_name }}" >> status_report.md
          cat status_report.md

      - name: Upload status report
        uses: actions/upload-artifact@v6
        with:
          name: pipeline-status-report
          path: status_report.md
