name: CI/CD Pipeline - 4-Tier Test Pyramid

# Test Pyramid Strategy (Google Testing Blog):
#   Unit 70% / Integration 15% / System 10% / E2E 5%
# Coverage Target: 85% (baseline protection, dynamic targets in local dev)
# Reference: .serena/memories/test_strategy_part1_overview.md

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly (Sunday 00:00 UTC)

jobs:
  # ============================================================
  # Stage 1: PR Validation (Fast Feedback < 5 min)
  # Triggers: pull_request
  # Tests: develop → Unit + Integration
  #        main → Unit + Integration + Smoke（厳格化）
  # ============================================================
  pr-validation:
    name: PR Validation (Unit + Integration + Smoke for main)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15  # main PR時のDocker Build + Trivy追加（初回キャッシュミス時の安全マージン確保）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      # ═══════════════════════════════════════════════════
      # Fast Fail Checks (軽量チェックを優先実行)
      # 順序: gitleaks(3s) → bandit(5s) → ruff(5s) → mypy(15s) → tests(70s)
      # ═══════════════════════════════════════════════════

      - name: Run gitleaks (secrets detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bandit (Python SAST)
        run: uv run bandit -r utils/ config/ models/ -f json -o bandit-report.json -ll
        # -ll: MEDIUM以上の深刻度でのみ失敗

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Run ruff linter
        run: |
          uv run ruff check .
          echo "ruff_passed=true" >> $GITHUB_ENV

      - name: Run mypy type checker
        run: |
          uv run mypy utils/ config/ models/
          echo "mypy_passed=true" >> $GITHUB_ENV

      - name: Run core tests with coverage (Unit + Integration only)
        # Coverage scope: unit + integration tests only
        run: |
          uv run pytest -n auto -m "(unit or integration) and not slow and not manual and not external" \
            --cov=. --cov-report=term-missing --cov-report=json \
            --cov-fail-under=70 --maxfail=3 -v
          echo "core_tests_passed=true" >> $GITHUB_ENV

      - name: Run smoke tests (main PR only)
        # main向けPRは追加でsmokeテストを実行（本番保護）
        if: github.base_ref == 'main'
        run: |
          uv run pytest -m "smoke" -v --maxfail=1
          echo "smoke_tests_passed=true" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════
      # Docker Build + Trivy Scan (main PR + Dockerfile変更時のみ)
      # Purpose: 早期フィードバック - CRITICAL脆弱性のみ検出
      # ═══════════════════════════════════════════════════

      - name: Detect Docker file changes
        id: docker-changes
        if: github.base_ref == 'main'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'pyproject.toml'
              - 'uv.lock'

      - name: Set up Docker Buildx
        if: github.base_ref == 'main' && steps.docker-changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set image tag (PR)
        if: github.base_ref == 'main' && steps.docker-changes.outputs.docker == 'true'
        id: image-tag-pr
        run: echo "tag=myapp:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Build Docker image (main PR + Dockerfile changes)
        if: github.base_ref == 'main' && steps.docker-changes.outputs.docker == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          tags: ${{ steps.image-tag-pr.outputs.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (CRITICAL only - main PR)
        if: github.base_ref == 'main' && steps.docker-changes.outputs.docker == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image-tag-pr.outputs.tag }}
          severity: 'CRITICAL'
          exit-code: '1'
          format: 'table'
          ignore-unfixed: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-results
          path: |
            reports/
            coverage.json

  # ============================================================
  # Stage 2: Post-Merge Validation (Regression Protection < 3 min)
  # Triggers: push to main
  # Tests: Regression only (fast degrade detection)
  # ============================================================
  post-merge-validation:
    name: Post-Merge Validation (Regression)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Docker Build + Trivy追加のため5→8分に変更

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      #regression marker削除に伴い一時コメントアウト
      # - name: Run regression tests (Must Pass)
      #   run: |
      #     uv run pytest -n auto -m "regression" --maxfail=1 -v --tb=short
      #     echo "regression_tests_passed=true" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════
      # Docker Build + Trivy Scan (Defense-in-Depth Layer 5)
      # Purpose: 本番前最終防御線 - DockerイメージCVE検出
      # ═══════════════════════════════════════════════════

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image-tag
        run: echo "tag=myapp:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build production Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          tags: ${{ steps.image-tag.outputs.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (CRITICAL + HIGH)
        id: trivy-scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image-tag.outputs.tag }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-post-merge'

      - name: Fail job if vulnerabilities found
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "::error::Dockerイメージに脆弱性（CRITICAL/HIGH）が検出されました"
          exit 1

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-results
          path: reports/

  # ============================================================
  # Stage 3: Weekly Comprehensive Tests (< 30 min)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Tests: Performance + External API + Full Coverage
  # Note: Security は PR 毎の静的解析（gitleaks, bandit, ruff(S)）で代用
  # ============================================================
  weekly-comprehensive:
    name: Weekly Comprehensive (Performance + External)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Run performance tests
        run: |
          uv run pytest -m "performance" -v
          echo "performance_tests_passed=true" >> $GITHUB_ENV

      - name: Run external API tests (Weekly validation)
        id: external-tests  # Used for outcome-based error handling
        run: |
          uv run pytest -m "external and not manual" -v --maxfail=5
        continue-on-error: true

      - name: Report external test status (Failure)
        if: steps.external-tests.outcome == 'failure'
        run: echo "::warning::External API tests failed - investigate rate limits or API changes"

      - name: Report external test status (Success)
        if: steps.external-tests.outcome == 'success'
        run: echo "::notice::External API tests passed - all integrations healthy"

      - name: Full coverage report
        run: |
          uv run pytest --cov=. --cov-report=html:reports/htmlcov --cov-report=json -v
          echo "coverage_report_generated=true" >> $GITHUB_ENV

      - name: Upload weekly test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-comprehensive-results
          path: |
            reports/
            coverage.json

  # ============================================================
  # Status Report (Summary for all pipeline stages)
  # ============================================================
  status-report:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    needs: [pr-validation, post-merge-validation, weekly-comprehensive]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate status report
        run: |
          echo "# CI/CD Pipeline Status Report (4-Tier Test Pyramid)" > status_report.md
          echo "" >> status_report.md
          echo "## Test Pyramid Strategy" >> status_report.md
          echo "- Unit 70% / Integration 15% / System 10% / E2E 5%" >> status_report.md
          echo "- Coverage Target: 58% (baseline protection)" >> status_report.md
          echo "" >> status_report.md
          echo "## Stage Results" >> status_report.md
          echo "- PR Validation: ${{ needs.pr-validation.result || 'skipped' }}" >> status_report.md
          echo "- Post-Merge: ${{ needs.post-merge-validation.result || 'skipped' }}" >> status_report.md
          echo "- Weekly Comprehensive: ${{ needs.weekly-comprehensive.result || 'skipped' }}" >> status_report.md
          echo "" >> status_report.md
          echo "## Triggered By: ${{ github.event_name }}" >> status_report.md
          cat status_report.md

      - name: Upload status report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-status-report
          path: status_report.md
