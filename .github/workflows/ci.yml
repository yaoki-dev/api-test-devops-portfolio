name: CI/CD Pipeline

# Test Pyramid Strategy (Google Testing Blog):
#   Unit 70% / Integration 30%
# Coverage Target: 96.15% (achieved 2026-06, CI条件: unit+integration, not external)
# Reference: .serena/memories/test_strategy_part1_overview.md

# Default permissions (least privilege principle)
# security-events: write is granted at job level where needed
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0" # Weekly (Sunday 00:00 UTC)

jobs:
  # ============================================================
  # Stage 1: PR Validation
  # Triggers: pull_request
  # Tests: Unit + Integration (with coverage) → Smoke (no coverage)
  # Scope: develop/main PRs use identical strategy
  # ============================================================
  pr-validation:
    name: PR Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20 # 単一Python版（3.14固定、Dockerfile一致、matrix不要）

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      # ruff を mypy より先に実行: lint 問題を先に除去し mypy の誤検知を低減（実行順設計）
      - name: Run ruff check
        run: uv run ruff check .

      # mypyをvalidationジョブ内ステップとして統合
      # 設計決定: runner起動コスト~60秒削減 > 並列フィードバック喪失
      # 根拠: mypy失敗頻度低
      - name: Run mypy check
        run: uv run mypy utils/ config/ models/

      - name: Set test markers
        id: markers
        run: |
          echo "smoke_marker=smoke and not external" >> "$GITHUB_OUTPUT"
          echo "test_filter=(unit or integration) and not external" >> "$GITHUB_OUTPUT"
          echo "🎯 PR Validation: Unit + Integration (with coverage) → Smoke (no coverage)"

      - name: Run tests (unit + integration + smoke)
        run: |
          mkdir -p reports
          # Step 1: unit + integration with coverage
          uv run pytest -n auto -m "${{ steps.markers.outputs.test_filter }}" \
            --cov=utils --cov=config --cov=models \
            --cov-report=json:coverage.json \
            --cov-report=term-missing \
            -v --tb=short
          # Step 2: smoke without coverage (using output variable)
          uv run pytest -m "${{ steps.markers.outputs.smoke_marker }}" -v --tb=short --no-cov

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-validation-results-py3.14
          path: |
            reports/
            coverage.json
          if-no-files-found: warn

  # ============================================================
  # Stage 1.1: Markdown Quality Check
  # Triggers: pull_request
  # Checks: markdownlint, textlint (日本語対応)
  # ============================================================
  pr-md-quality-check:
    name: PR Markdown Quality Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        id: markdownlint
        run: npx markdownlint '**/*.md' --ignore-path .markdownlintignore
        continue-on-error: true

      - name: Run textlint
        id: textlint
        run: npx textlint '**/*.md' --ignore-path .textlintignore
        continue-on-error: true

      - name: Check lint results
        if: steps.markdownlint.outcome == 'failure' || steps.textlint.outcome == 'failure'
        run: |
          echo "::error::Markdown quality check failed"
          echo "markdownlint: ${{ steps.markdownlint.outcome }}"
          echo "textlint: ${{ steps.textlint.outcome }}"
          exit 1

  # ============================================================
  # Stage 1.2: PR Trivy Scan
  # Triggers: pull_request (develop, main)
  # Strategy:
  #   - develop: trivy fs only (fast, no Docker build)
  #   - main: trivy fs + trivy image (comprehensive)
  # Format: SARIF (error differentiation + GitHub Security tab integration)
  # Error Handling: Differentiates security findings vs infrastructure errors
  # ============================================================
  pr-trivy-scan:
    name: PR Trivy scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Explicit permissions (security hardening)
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Step 1: Filesystem scan (both develop and main)
      - name: Trivy filesystem scan (dependencies)
        id: fs-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-scan.sarif"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          # Trivyキャッシュ戦略: 週次スケジュール実行時のみDB再ダウンロード、通常PRではキャッシュ利用
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify filesystem scan execution
        id: verify-fs-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: "trivy-fs-scan.sarif"
          scan-type: "filesystem"

      - name: Upload filesystem scan results to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && steps.verify-fs-scan.outcome == 'success' && steps.fs-scan.outcome != 'cancelled' && steps.fs-scan.outcome != 'skipped'
        with:
          sarif_file: "trivy-fs-scan.sarif"
          category: "trivy-pr-fs-scan"

      - name: Fail job if vulnerabilities found or verification failed
        if: |
          !cancelled() && (
            steps.fs-scan.outcome == 'failure' ||
            steps.fs-scan.outcome == 'cancelled' ||
            steps.fs-scan.outcome == 'skipped' ||
            steps.verify-fs-scan.outcome == 'failure' ||
            steps.verify-fs-scan.outcome == 'cancelled'
          )
        run: |
          # 優先度1: スキャン未実施
          if [ "${{ steps.fs-scan.outcome }}" == "skipped" ]; then
            echo "::error::Trivy filesystem scan was skipped — security gate requires scan to complete"
            exit 1
          fi
          # 優先度2: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-fs-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度3: 脆弱性検出（正常な失敗）
          if [ "${{ steps.fs-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が dependencies で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、依存関係を更新してください"
          fi
          exit 1

      # Step 2: Build Docker image (main PRs + Dependabot docker PRs)
      - name: Build Docker image for scanning
        id: docker-build
        # Trigger conditions (OR logic):
        # 1. main PRs: Production security validation
        # 2. docker label PRs: Dependabot SHA256 updates
        #    - Dependabotがdependabot.yml L103設定により'docker'ラベルを自動付与
        #    - target: develop, CI gate before auto-merge
        if: github.base_ref == 'main' || contains(github.event.pull_request.labels.*.name, 'docker')
        run: |
          if ! docker build -t security-scan:${{ github.sha }} --target runtime .; then
            echo "::error::Docker build failed"
            exit 1
          fi

      - name: Fail if Docker build failed (security gate)
        if: |
          !cancelled() && (
            steps.docker-build.outcome == 'failure' ||
            steps.docker-build.outcome == 'cancelled'
          )
        run: |
          echo "::error::Docker build ${{ steps.docker-build.outcome }} — image scan skipped. Security gate requires image scan to pass."
          exit 1

      # Step 3: Docker image scan (main PRs + Dependabot docker PRs)
      - name: Trivy image scan (main PRs + docker label)
        id: image-scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: "security-scan:${{ github.sha }}"
          format: "sarif"
          output: "trivy-image-scan.sarif"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          # Trivyキャッシュ戦略: 週次スケジュール実行時のみDB再ダウンロード、通常PRではキャッシュ利用
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify image scan execution
        id: verify-image-scan
        if: always() && steps.image-scan.outcome != 'skipped'
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: "trivy-image-scan.sarif"
          scan-type: "image"

      - name: Upload image scan results to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && steps.verify-image-scan.outcome == 'success' && steps.image-scan.outcome != 'cancelled' && steps.image-scan.outcome != 'skipped'
        with:
          sarif_file: "trivy-image-scan.sarif"
          category: "trivy-pr-image-scan"

      - name: Fail job if vulnerabilities found or verification failed
        if: |
          always() && !cancelled() && (
          steps.image-scan.outcome == 'failure' ||
          steps.image-scan.outcome == 'cancelled' ||
          steps.verify-image-scan.outcome == 'failure' ||
          steps.verify-image-scan.outcome == 'cancelled'
          )
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-image-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.image-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      # Step 4: Cleanup Docker image (resource hygiene)
      - name: Clean up Docker image
        if: always() && steps.docker-build.outcome != 'skipped'
        run: docker rmi security-scan:${{ github.sha }} || true

  # ============================================================
  # Stage 2: Docker Compose Verification
  # Triggers: pull_request + push (develop, main)
  # Tests: Compose test profile (pytest + coverage) → Compose app healthcheck
  # ============================================================
  compose-test:
    name: Compose test profile (pytest + coverage)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: test
          tags: api-test-devops:test
          load: true
          # load: true時の manifest unknown エラー回避
          provenance: false
          cache-from: |
            type=gha,scope=api-test-runtime
            type=gha,scope=compose-test
          # PR時の cache poisoning 防止: cache-to は develop/main push時のみ書込
          # (post-trivy-scan・ci.yml 他ジョブと同方針で統一)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=compose-test' || '' }}

      - name: Prepare reports dir (bind-mount uid mismatch回避)
        # CI runner と container appuser の uid/gid を同期し、bind mount への書込を
        # world-writable にせず 755 で成立させる。
        run: |
          echo "DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"
          mkdir -p reports
          chmod 755 reports

      - name: Run pytest in test container
        run: |
          set -o pipefail
          docker compose --profile test run --rm test 2>&1 | tee reports/compose-test-output.log

      - name: Show pytest output on failure
        if: failure()
        # `run --rm` は終了後に container を削除するため、compose logs ではなく
        # 実行時 stdout/stderr を保存したファイルを再表示する。
        run: |
          if [ -s reports/compose-test-output.log ]; then
            tail -1000 reports/compose-test-output.log
          else
            echo "::warning::pytest 出力ログが保存されていません"
          fi

      - name: Verify coverage artifacts exist
        # if-no-files-found: warn のサイレント成功を防ぐ。`--no-cov` が誤って追加された
        # 場合や bind mount 失敗時にここで fail-loud にする。
        # 注意: パス依存 — pyproject.toml の [tool.coverage] 設定 (reports/coverage.xml /
        # reports/htmlcov) を変更する場合は本ステップの path も同時更新する必要がある。
        # 検証ロジック: `! -f coverage.xml || ! -d htmlcov` で片方欠落でも fail-loud。
        # pytest 途中終了で coverage.xml が空生成されるケースも空ファイル検知 (-s) で失敗させる。
        run: |
          if [ ! -f reports/coverage.xml ] || [ ! -d reports/htmlcov ]; then
            echo "::error::カバレッジ成果物が生成されませんでした (reports/coverage.xml または reports/htmlcov が見つかりません)"
            exit 1
          fi
          if [ ! -s reports/coverage.xml ]; then
            echo "::error::reports/coverage.xml が空ファイルです（pytest が途中終了した可能性があります）"
            exit 1
          fi

      - name: Generate coverage badge SVG
        # Cosmetic artifact: genbadge失敗でテスト結果やCDを止めず、deploy-pages側のfallback SVGへ委譲する。
        run: |
          docker compose --profile test run --rm --entrypoint genbadge test \
            coverage --local -i reports/coverage.xml -o reports/coverage.svg \
            || echo "::warning::genbadge 失敗 — coverage.svg 未生成（deploy-pages は n/a fallback SVG を使用）"
          if [ ! -s reports/coverage.svg ]; then
            echo "::warning::coverage.svg が空または未生成 — deploy-pages が n/a fallback を表示します"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down
        if: always()
        # compose-test ジョブは `--rm` で container は自動削除されるが network/volume は残存しうる。
        # compose-healthcheck ジョブと対称化して明示 cleanup。
        # teardown失敗は warning のみで継続。
        # ephemeral runner (ubuntu-latest は VM ごと破棄) のため teardown 失敗は次回 CI に影響しない。
        run: |
          docker compose down --remove-orphans --timeout=10 || {
            echo "::warning::docker compose down failed"
            docker compose ps || true
            true
          }

  # ============================================================
  # CD Stage: Coverage HTML を GitHub Pages へ公開
  # Trigger: main への push のみ。compose-test の coverage-reports artifact 再利用
  # ============================================================
  deploy-pages:
    name: Deploy coverage to GitHub Pages
    if: success() && github.ref == 'refs/heads/main'
    needs: [compose-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # artifact download requires read access
      pages: write # GitHub Pages deployment
      id-token: write # OIDC token for Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: artifact/

      - name: Stage Pages site
        run: |
          set -euo pipefail
          if [ ! -d artifact/htmlcov ]; then
            echo "::error::artifact/htmlcov が見つかりません"
            exit 1
          fi
          mkdir -p _site
          cp -r artifact/htmlcov _site/htmlcov
          cat > _site/index.html <<'HTML'
          <!doctype html><html><head>
          <meta http-equiv="refresh" content="0; url=./htmlcov/">
          <title>Coverage Report</title></head>
          <body>Redirecting to <a href="./htmlcov/">coverage report</a>...</body></html>
          HTML

      - name: Stage coverage badge SVG
        run: |
          set -euo pipefail
          cat > _site/coverage.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="114" height="20" role="img" aria-label="coverage: n/a">
          <rect width="114" height="20" fill="#555"/><rect x="62" width="52" height="20" fill="#9f9f9f"/>
          <g fill="#fff" font-family="Verdana,sans-serif" font-size="11" text-anchor="middle">
          <text x="31" y="14">coverage</text><text x="88" y="14">n/a</text></g></svg>
          SVG
          if [ -f artifact/coverage.svg ]; then
            cp artifact/coverage.svg _site/coverage.svg
          else
            echo "::warning::artifact/coverage.svg 不在 — fallback SVG を維持します"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ============================================================
  # CD Stage: runtime イメージを GHCR へ publish
  # Trigger: main への push のみ。compose-test + post-trivy-scan グリーン後に実行（CVEゲート）
  # ============================================================
  publish-image:
    name: Publish runtime image to GHCR
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    # compose-healthcheck の必要性: 防御的に追加
    # GHCR 公開前に、アプリケーションが実際に正常であることを確認します (docker compose up --wait verified)。
    needs: [compose-test, compose-healthcheck, post-trivy-scan]

    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ghcr-publish
      cancel-in-progress: true
    permissions:
      contents: read
      # docker/build-push-action で GHCR に push するために必要
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
          # format=long で 40-char full SHA を生成し、verify-published-image の
          # sha-${{ github.sha }} と一致させる

      - name: Build and push runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=api-test-runtime
          cache-to: type=gha,mode=max,scope=api-test-runtime

  # ============================================================
  # CD Stage: publish した image を pull+run して実行可能性を検証（"deploy & verify"）
  # Trigger: main への push のみ。publish-image グリーン後に実行
  # ============================================================
  verify-published-image:
    name: Verify published image (pull & run)
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # 匿名 public pull で検証するため packages: read / login は不要。
      # GITHUB_TOKEN を使わず利用者と同じ匿名取得経路で「公開されている」ことを証明する。
    steps:
      - name: Pull and run published image (smoke, anonymous)
        env:
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" \
            python -c "from config.settings import settings; assert settings.environment; print('SMOKE_OK')"

  compose-healthcheck:
    needs: [compose-test]
    name: Compose app healthcheck
    # 起動ゲートは needs:[compose-test] が継承する。compose-test が if 条件で skip
    # された場合、依存チェーンに沿って本ジョブも自動 skip されるため、compose-test と
    # 同一の if: 条件をここで重複指定する必要はない（DRY）。
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # キャッシュミス時 (初回PR等) Build 2-4min + wait-timeout 120s +
    # teardown で 10分は逼迫する。compose-test (15min) と対称化してキャッシュミス耐性を確保。
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Validate compose config は compose-test ジョブで実行済み (needs: [compose-test] で保証)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build app(runtime) image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: runtime
          tags: api-test-devops:runtime
          load: true
          # load: true時の manifest unknown エラー回避 (compose-test job と対称)
          provenance: false
          # ci.yml の runtime キャッシュを読む。healthcheck job は読み取り専用にして
          # PR時の cache poisoning と重複書き込みを避ける。
          cache-from: |
            type=gha,scope=api-test-runtime
            type=gha,scope=compose-test
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=api-test-runtime' || '' }}

      - name: Start app and wait for healthy
        # Docker Compose 2.2 以降のネイティブ機能に置き換え
        # タイムアウト根拠: start-period(5s) + timeout(10s) + (interval(30s)+timeout(10s)) × (retries-1)(2) = 5+10+80 = 95s。余裕を持たせて120sに設定。
        # GNU timeout で compose 側の wait-timeout exit code 不保証にも上限を設ける。
        run: timeout 150s docker compose up -d --wait --wait-timeout 120 --no-build app

      - name: Verify app is actually healthy (defense-in-depth)
        # `docker compose up --wait --wait-timeout` 超過時の
        # exit code は Docker Compose 一部バージョンで 0 になる既知挙動がある
        # (docker/compose#10596 系)。silent success を防ぐため
        # docker inspect で Health.Status を明示確認する。
        # ジョブが healthy 以外の状態で green になるサイレント失敗を防止する。
        run: |
          CONTAINER_ID=$(docker compose ps -q app | head -n 1)
          if [ -z "$CONTAINER_ID" ]; then
            echo "::error::app コンテナが存在しません (起動失敗)"
            docker compose ps
            docker compose logs --tail=1000 app || echo "::warning::docker compose logs failed (container removed or log driver error?)"
            exit 1
          fi
          if ! HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>&1); then
            echo "::error::docker inspect 失敗 (出力: $HEALTH, CONTAINER_ID: $CONTAINER_ID)"
            exit 1
          fi
          echo "App health status: $HEALTH"
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::app コンテナが healthy ではありません (状態: $HEALTH)"
            docker compose ps
            docker compose logs --tail=1000 app || echo "::warning::docker compose logs failed (container removed or log driver error?)"
            exit 1
          fi

      - name: Compose ps (diagnostic)
        if: failure()
        # restart: on-failure による再起動ループ時の根本原因切れ防止のため --tail=1000 に拡張
        # (200行では複数試行ログ混在で初期スタックトレースが切れる可能性あり)
        # docker compose ps 失敗 (再起動ループ中で
        # コンテナが瞬間的に不在等) 時に set -e で logs がスキップされる問題を解消。
        # 既存 `Show test container logs on failure` step (compose-test) の
        # `|| echo "::warning::..."` パターンと整合させ、診断ログ取得確実性を担保。
        run: |
          docker compose ps || echo "::warning::docker compose ps failed (container missing during restart loop?)"
          docker compose logs --tail=1000 app || echo "::warning::docker compose logs failed (container removed or log driver error?)"

      - name: Tear down
        if: always()
        # 0. ephemeral runner (ubuntu-latest は VM ごと破棄) のため teardown 失敗は次回 CI に影響しない
        # 1. --timeout=10: コンテナ停止猶予秒数 (SIGTERMからSIGKILLまで。デフォルト10秒)
        # 2. ブロック化 `|| { ... ; }`: シェル優先度 `(A || B) ; true` バグ修正
        # 3. exit 0 維持 — teardown failure はwarning通知のみで後続ジョブをブロックしない
        run: |
          docker compose down --remove-orphans --timeout=10 || {
            echo "::warning::docker compose down failed"
            docker compose ps || true
            true
          }

  # ============================================================
  # Stage 3: Post Validation
  # Triggers: push to main or develop
  # Tests: Smoke
  # ============================================================
  post-validation:
    name: Post Validation (mypy + Smoke)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 10 # mypy + Smoke（直列、pr-validationと同等構成。mypy初回キャッシュ未生成時の余裕確保）
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      # ruff を mypy より先に実行: lint 問題を先に除去し mypy の誤検知を低減（実行順設計）
      - name: Run ruff check
        run: uv run ruff check .

      # mypyをvalidationジョブ内ステップとして統合
      # 設計決定: runner起動コスト~60秒削減 > 並列フィードバック喪失
      # 根拠: mypy失敗頻度低
      - name: Run mypy check (Post Validation)
        run: uv run mypy utils/ config/ models/

      - name: Run smoke tests (Post Validation)
        id: smoke-tests
        run: |
          uv run pytest -m "smoke and not external" -v --tb=short --no-cov
        env:
          ENVIRONMENT: testing

      - name: Create reports directory
        run: mkdir -p reports

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-results
          path: reports/
          if-no-files-found: warn

  # ============================================================
  # Stage 3.1: Post Trivy Security Scan
  # Triggers: push to main or develop
  # Strategy: fs scan (dependencies) + image scan (Docker image)
  #   following pr-trivy-scan pattern for consistency
  # Format: SARIF (error differentiation + GitHub Security tab integration)
  # ============================================================
  post-trivy-scan:
    name: Post Trivy Scan
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code (Post Trivy Scan)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # ===== Stage 1: Filesystem Scan (dependencies) =====
      - name: Trivy filesystem scan (dependencies) (Post Trivy Scan)
        id: fs-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-post-fs-scan.sarif"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify filesystem scan execution (Post Trivy Scan)
        id: verify-fs-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: "trivy-post-fs-scan.sarif"
          scan-type: "filesystem"

      - name: Upload filesystem scan results to Security tab (Post Trivy Scan)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && steps.verify-fs-scan.outcome == 'success' && steps.fs-scan.outcome != 'cancelled' && steps.fs-scan.outcome != 'skipped'
        with:
          sarif_file: "trivy-post-fs-scan.sarif"
          category: "trivy-post-fs-scan"

      - name: Fail job if fs vulnerabilities found or verification failed (Post Trivy Scan)
        if: |
          !cancelled() && (
            steps.fs-scan.outcome == 'failure' ||
            steps.fs-scan.outcome == 'cancelled' ||
            steps.fs-scan.outcome == 'skipped' ||
            steps.verify-fs-scan.outcome == 'failure' ||
            steps.verify-fs-scan.outcome == 'cancelled'
          )
        run: |
          if [ "${{ steps.fs-scan.outcome }}" == "skipped" ]; then
            echo "::error::Trivy filesystem scan was skipped — security gate requires scan to complete"
            exit 1
          fi
          if [ "${{ steps.verify-fs-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
          fi
          if [ "${{ steps.fs-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が dependencies で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、依存関係を更新してください"
          fi
          exit 1

      # ===== Stage 2: Docker Image Build =====
      - name: Set up Docker Build (Post Trivy Scan)
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set image tag
        id: image-tag
        run: echo "tag=myapp:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build production Docker image
        id: docker-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: runtime
          tags: ${{ steps.image-tag.outputs.tag }}
          load: true
          cache-from: type=gha,scope=api-test-runtime
          # PR時の cache poisoning 防止: cache-to は develop/main push時のみ書込
          # (PR branch contributor が tainted base layer を `api-test-runtime` scope に
          #  注入し trunk CI が consume する same-repo poisoning vector を遮断)
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=api-test-runtime' || '' }}

      - name: Fail if Docker build failed (security gate)
        if: |
          !cancelled() && (
            steps.docker-build.outcome == 'failure' ||
            steps.docker-build.outcome == 'cancelled'
          )
        run: |
          echo "::error::Docker build ${{ steps.docker-build.outcome }} — image scan skipped. Security gate requires image scan to pass."
          exit 1

      # ===== Stage 3: Docker Image Scan =====
      - name: Trivy image scan (CRITICAL + HIGH) (Post Trivy Scan)
        id: image-scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: ${{ steps.image-tag.outputs.tag }}
          format: "sarif"
          output: "trivy-post-image-scan.sarif"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify image scan execution (Post Trivy Scan)
        id: verify-image-scan
        if: always() && steps.image-scan.outcome != 'skipped'
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: "trivy-post-image-scan.sarif"
          scan-type: "image"

      - name: Upload image scan results to Security tab (Post Trivy Scan)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && steps.verify-image-scan.outcome == 'success' && steps.image-scan.outcome != 'cancelled' && steps.image-scan.outcome != 'skipped'
        with:
          sarif_file: "trivy-post-image-scan.sarif"
          category: "trivy-post-image-scan"

      # 'skipped'チェックは Docker build security gate (上記) が先に exit する shielding により
      # 通常重複だが、将来の条件分岐変更時の防御的セーフネット（pr-trivy-scan fs-scan L464と対称）
      - name: Fail job if image vulnerabilities found or verification failed (Post Trivy Scan)
        if: |
          !cancelled() && (
            steps.image-scan.outcome == 'failure' ||
            steps.image-scan.outcome == 'cancelled' ||
            steps.image-scan.outcome == 'skipped' ||
            steps.verify-image-scan.outcome == 'failure' ||
            steps.verify-image-scan.outcome == 'cancelled'
          )
        run: |
          if [ "${{ steps.verify-image-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
          fi
          if [ "${{ steps.image-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      # ===== Cleanup =====
      - name: Clean up Docker image (Post Trivy Scan)
        if: always() && steps.docker-build.outcome != 'skipped'
        run: docker rmi ${{ steps.image-tag.outputs.tag }} || true

  # ============================================================
  # Stage 4: Weekly Extended Tests (< 30 min)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Tests: Performance + External API + Full Coverage
  # Note: Security は PR 毎の静的解析（gitleaks, ruff(S)）で代用
  #       Python SAST: ruff S-rulesでbandit主要ルールを概ね網羅（B1-3xx, B310-315含む）
  #       高セキュリティ要件時はbanditを別途実行推奨（ruff S-rulesはbanditの完全な代替ではない）
  # ============================================================
  weekly-extended-test:
    name: Weekly Extended Test
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run performance tests
        run: uv run pytest -m "performance" -v

      - name: Run external API tests
        id: external-tests # Used for outcome-based error handling
        # External API tests run only if performance tests completed (success or failure).
        # On cancellation, external tests are intentionally skipped to save CI costs and API rate limits.
        # Next scheduled run or manual re-run should be used to verify external API health.
        if: "!cancelled()"
        run: |
          uv run pytest -m "external" -v --maxfail=5
        continue-on-error: true

      - name: Report external test status (Failure)
        if: steps.external-tests.outcome == 'failure'
        run: |
          echo "::warning::External API tests failed - investigate rate limits or API changes"
          {
            echo "## ⚠️ 外部APIテスト: 失敗"
            echo ""
            echo "週次外部APIテスト (\`pytest -m external\`) が失敗しました。"
            echo ""
            echo "**原因候補**:"
            echo "- 外部API rate limit 到達"
            echo "- API仕様変更（JSONPlaceholder等）"
            echo "- ネットワーク一時障害"
            echo ""
            echo "**確認手順**: Actions ログの \`external-tests\` ステップを参照してください。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report external test status (Success)
        if: steps.external-tests.outcome == 'success'
        run: echo "::notice::External API tests passed - all integrations healthy"

      - name: Full coverage report
        # unit/integration/smoke/slow のみ（performance/external は上で個別実行済）
        run: uv run pytest -m 'not performance and not external' --cov=. --cov-report=html:reports/htmlcov --cov-report=json -v

      - name: Upload weekly test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-extended-test-results-py3.14
          path: |
            reports/
            coverage.json

  # ============================================================
  # Stage 4.1: Weekly Link Check
  # Role: Detailed log collection — runs all files with continue-on-error
  #   and saves results as artifact (does not fail the workflow)
  # Counterpart: markdown-link-check.yml acts as gate check (fails on broken links)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Checks: markdown-link-check (external/internal links)
  # ============================================================
  weekly-link-check:
    name: Weekly Link Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code (Weekly Link Check)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js (Weekly Link Check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (Weekly Link Check)
        run: npm ci

      - name: Find Markdown files (Weekly Link Check)
        id: find-md
        run: |
          # Find MD files, excluding ignored directories (sync with .textlintignore)
          find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.venv/*' \
            -not -path './docs/archive/*' \
            -not -path './docs/coverage/*' \
            -not -path './docs/main/6週プラン/*' \
            -not -path './docs/main/learning/*' \
            -not -path './docs/main/Skills作成/*' \
            -not -path './docs/ai_collaboration/*' \
            -not -path './docs/tools/*' \
            -not -path './reports/*' \
            -not -path './.taskmaster/*' \
            -not -path './.spec-workflow/*' \
            -not -path './obsidian-vault-local/*' \
            -type f > md_files.txt
          # Null-terminated for safe xargs -0 in next step (handles special chars in filenames)
          tr '\n' '\0' < md_files.txt > md_files.nul
          echo "Found $(wc -l < md_files.txt) Markdown files"

      - name: Run markdown-link-check (Weekly Link Check)
        run: |
          # Security: Use -print0/xargs -0 to safely handle filenames with special characters
          # Performance note: Sequential execution chosen for weekly job (batch mode would fail-fast on first error)
          echo "# Link Check Results - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > link-check-results.log

          check_file() {
            local file="$1"
            echo "Checking: $file"
            echo "## $file" >> link-check-results.log
            npx markdown-link-check "$file" --config .markdown-link-check.json 2>&1 | tee -a link-check-results.log || true
            echo "" >> link-check-results.log
          }
          export -f check_file

          # Reuse md_files.nul from previous step (null-terminated — avoids duplicate find traversal)
          xargs -0 -I {} bash -c 'check_file "$@"' _ {} < md_files.nul
        continue-on-error: true

      - name: Upload link check results (Weekly Link Check)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: link-check-results
          path: |
            md_files.txt
            link-check-results.log

  # ============================================================
  # Status Report (Summary for all pipeline stages)
  # ============================================================
  status-report:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    # Note: Skipped jobs are treated as 'success' by GitHub Actions
    # !cancelled() overrides implicit success() check, allowing execution after success/failure/skipped
    needs:
      [
        pr-validation,
        pr-trivy-scan,
        pr-md-quality-check,
        post-validation,
        post-trivy-scan,
        weekly-extended-test,
        weekly-link-check,
        compose-test,
        deploy-pages,
        compose-healthcheck,
        publish-image,
        verify-published-image,
      ]
    if: "!cancelled()"
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate status report
        run: |
          {
            echo "# CI/CD Pipeline Status Report"
            echo ""
            echo "## Test Pyramid Strategy"
            echo "- Unit 70% / Integration 30%"
            echo "- Coverage Target: 96.15% (achieved)"
            echo ""
            echo "## Stage Results"
            echo "- PR Validation: ${{ needs.pr-validation.result }}"
            echo "- PR Trivy Scan: ${{ needs.pr-trivy-scan.result }}"
            echo "- PR MD Quality Check: ${{ needs.pr-md-quality-check.result }}"
            echo "- Post Validation: ${{ needs.post-validation.result }}"
            echo "- Post Trivy Scan: ${{ needs.post-trivy-scan.result }}"
            echo "- Weekly Extended Test: ${{ needs.weekly-extended-test.result }}"
            echo "- Weekly Link Check: ${{ needs.weekly-link-check.result }}"
            echo "- Compose Test (pytest + coverage): ${{ needs.compose-test.result }}"
            echo "- Deploy Pages (CD): ${{ needs.deploy-pages.result }}"
            echo "- Publish Image (CD): ${{ needs.publish-image.result }}"
            echo "- Verify Published Image (CD): ${{ needs.verify-published-image.result }}"
            echo "- Compose Healthcheck: ${{ needs.compose-healthcheck.result }}"
            echo ""
            echo "## Triggered By: ${{ github.event_name }}"
          } > status_report.md
          cat status_report.md

      - name: Upload status report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pipeline-status-report
          path: status_report.md
