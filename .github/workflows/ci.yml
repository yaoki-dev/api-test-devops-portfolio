name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, local/history]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 1: Regression Tests (Critical tests that must pass)
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run regression tests
        run: |
          uv run pytest -m regression -v --tb=short
          echo "regression_tests_passed=true" >> $GITHUB_ENV

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: reports/

  # Job 2: Quality Checks (Linter, Type checker, Security scan)
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: regression-tests
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run ruff linter
        run: |
          uv run ruff check .
          echo "ruff_passed=true" >> $GITHUB_ENV

      - name: Run mypy type checker
        run: |
          uv run mypy utils/ config/
          echo "mypy_passed=true" >> $GITHUB_ENV

      - name: Run security scan (scan_secrets.py)
        run: |
          python scripts/scan_secrets.py
          echo "security_scan_passed=true" >> $GITHUB_ENV

      - name: Upload quality check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-check-results
          path: reports/

  # Job 3: Status Report (Summary of pipeline execution)
  status-report:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    needs: [regression-tests, quality-checks]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate status report
        run: |
          echo "# CI/CD Pipeline Status Report" > status_report.md
          echo "" >> status_report.md
          echo "## Regression Tests" >> status_report.md
          echo "Status: ${{ needs.regression-tests.result }}" >> status_report.md
          echo "" >> status_report.md
          echo "## Quality Checks" >> status_report.md
          echo "Status: ${{ needs.quality-checks.result }}" >> status_report.md
          echo "" >> status_report.md
          echo "## Overall Pipeline Status" >> status_report.md
          if [ "${{ needs.regression-tests.result }}" == "success" ] && [ "${{ needs.quality-checks.result }}" == "success" ]; then
            echo "✅ All checks passed" >> status_report.md
          else
            echo "❌ Pipeline failed" >> status_report.md
          fi
          cat status_report.md

      - name: Upload status report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-status-report
          path: status_report.md

      - name: Set pipeline status
        run: |
          if [ "${{ needs.regression-tests.result }}" == "success" ] && [ "${{ needs.quality-checks.result }}" == "success" ]; then
            echo "Pipeline succeeded"
            exit 0
          else
            echo "Pipeline failed"
            exit 1
          fi
