name: CI/CD Pipeline - 3-Tier Test Pyramid

# Test Pyramid Strategy (Google Testing Blog):
#   Unit 70% / Integration 25% / E2E 5%
# Coverage Target: 85% (baseline protection, dynamic targets in local dev)
# Reference: .serena/memories/test_strategy_part1_overview.md

# Default permissions (least privilege principle)
# security-events: write is granted at job level where needed
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly (Sunday 00:00 UTC)

jobs:
  # ============================================================
  # Stage 1: PR Validation
  # Triggers: pull_request
  # Tests: Unit + Integration (with coverage) → Smoke (no coverage)
  # Scope: develop/main PRs use identical strategy
  # ============================================================
  pr-validation:
    name: PR Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 単一Python版（3.14固定、Dockerfile一致、matrix不要）

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      # mypyをvalidationジョブ内ステップとして統合
      # 設計決定: runner起動コスト~60秒削減 > 並列フィードバック喪失
      # 根拠: テスト612件・信頼度高、mypy失敗頻度低（498df52の並列設計から変更）
      # トレードオフ承認: PR#351で合意済
      - name: Run mypy type check
        run: uv run mypy utils/ config/ models/

      - name: Set test markers
        id: markers
        run: |
          echo "smoke_marker=smoke and not external" >> $GITHUB_OUTPUT
          echo "value=(unit or integration) and not external" >> $GITHUB_OUTPUT
          echo "🎯 PR Validation: Unit + Integration (with coverage) → Smoke (no coverage)"

      - name: Run tests (unit + integration + smoke)
        run: |
          mkdir -p reports
          # Step 1: unit + integration with coverage
          uv run pytest -n auto -m "${{ steps.markers.outputs.value }}" \
            --cov=utils --cov=config --cov=models \
            --cov-report=json:coverage.json \
            --cov-report=term-missing \
            -v --tb=short
          # Step 2: smoke without coverage (using output variable)
          uv run pytest -m "${{ steps.markers.outputs.smoke_marker }}" -v --tb=short --no-cov

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-validation-results-py3.14
          path: |
            reports/
            coverage.json
          if-no-files-found: warn

  # ============================================================
  # Stage 1.1: Markdown Quality Check
  # Triggers: pull_request
  # Checks: markdownlint, textlint (日本語対応)
  # ============================================================
  pr-md-quality-check:
    name: PR Markdown Quality Check (PR Validation)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        id: markdownlint
        run: npx markdownlint '**/*.md' --ignore-path .markdownlintignore
        continue-on-error: true

      - name: Run textlint
        id: textlint
        run: npx textlint '**/*.md' --ignore-path .textlintignore
        continue-on-error: true

      - name: Check lint results
        if: steps.markdownlint.outcome == 'failure' || steps.textlint.outcome == 'failure'
        run: |
          echo "::error::Markdown quality check failed"
          echo "markdownlint: ${{ steps.markdownlint.outcome }}"
          echo "textlint: ${{ steps.textlint.outcome }}"
          exit 1

  # TEMPORARY — Legacy job stubs (PR#351 deadlock resolution)
  # pr-mypy-check / post-mypy-check: merged into pr-validation / post-validation
  # post-merge-validation: renamed to post-validation
  # REMOVE after all open PRs pick up this commit
  pr-mypy-check:
    name: mypy Check (PR Validation)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: 'echo "Legacy stub — mypy now in pr-validation (PR #351)"'

  post-mypy-check:
    name: mypy Check (Post Merge)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: 'echo "Legacy stub — mypy now in post-validation (PR #351)"'

  post-merge-validation:
    name: Post Merge Validation
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "Legacy stub — renamed to post-validation (PR #351)"
  # NOTE: post-validation uses Python 3.14 only (matches Dockerfile)

  # ============================================================
  # Stage 1.2: PR Trivy Scan
  # Triggers: pull_request (develop, main)
  # Strategy:
  #   - develop: trivy fs only (fast, no Docker build)
  #   - main: trivy fs + trivy image (comprehensive)
  # Format: SARIF (error differentiation + GitHub Security tab integration)
  # Error Handling: Differentiates security findings vs infrastructure errors
  # ============================================================
  pr-trivy-scan:
    name: PR Trivy scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Explicit permissions (security hardening)
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Step 1: Filesystem scan (both develop and main)
      - name: Trivy filesystem scan (dependencies)
        id: fs-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          # Trivyキャッシュ戦略: 週次スケジュール実行時のみDB再ダウンロード、通常PRではキャッシュ利用
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify filesystem scan execution
        id: verify-fs-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-fs-scan.sarif'
          scan-type: 'filesystem'

      - name: Upload filesystem scan results to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always() && steps.verify-fs-scan.outcome == 'success' && steps.fs-scan.outcome != 'cancelled' && steps.fs-scan.outcome != 'skipped'
        with:
          sarif_file: 'trivy-fs-scan.sarif'
          category: 'trivy-pr-fs-scan'

      - name: Fail job if vulnerabilities found or verification failed
        if: |
          steps.fs-scan.outcome == 'failure' ||
          steps.fs-scan.outcome == 'cancelled' ||
          steps.verify-fs-scan.outcome == 'failure' ||
          steps.verify-fs-scan.outcome == 'cancelled'
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-fs-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.fs-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が dependencies で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、依存関係を更新してください"
          fi
          exit 1

      # Step 2: Build Docker image (main PRs + Dependabot docker PRs)
      - name: Build Docker image for scanning
        id: docker-build
        # Trigger conditions (OR logic):
        # 1. main PRs: Production security validation
        # 2. docker label PRs: Dependabot SHA256 updates
        #    - Dependabotがdependabot.yml L103設定により'docker'ラベルを自動付与
        #    - target: develop, CI gate before auto-merge
        if: github.base_ref == 'main' || contains(github.event.pull_request.labels.*.name, 'docker')
        run: |
          if ! docker build -t security-scan:${{ github.sha }} --target runtime .; then
            echo "::error::Docker build failed"
            exit 1
          fi

      # Step 3: Docker image scan (main PRs + Dependabot docker PRs)
      - name: Trivy image scan (main PRs + docker label)
        id: image-scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: 'security-scan:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          # Trivyキャッシュ戦略: 週次スケジュール実行時のみDB再ダウンロード、通常PRではキャッシュ利用
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify image scan execution
        id: verify-image-scan
        if: always() && steps.image-scan.outcome != 'skipped'
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-image-scan.sarif'
          scan-type: 'image'

      - name: Upload image scan results to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always() && steps.verify-image-scan.outcome == 'success' && steps.image-scan.outcome != 'cancelled' && steps.image-scan.outcome != 'skipped'
        with:
          sarif_file: 'trivy-image-scan.sarif'
          category: 'trivy-pr-image-scan'

      - name: Fail job if vulnerabilities found or verification failed
        if: |
          steps.image-scan.outcome == 'failure' ||
          steps.image-scan.outcome == 'cancelled' ||
          steps.verify-image-scan.outcome == 'failure' ||
          steps.verify-image-scan.outcome == 'cancelled'
        run: |
          # 優先度1: SARIF検証失敗（インフラ問題の可能性）
          if [ "${{ steps.verify-image-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
            echo "::notice::対処法: Trivyログを確認し、インフラ問題を調査してください"
          fi

          # 優先度2: 脆弱性検出（正常な失敗）
          if [ "${{ steps.image-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      # Step 4: Cleanup Docker image (resource hygiene)
      - name: Clean up Docker image
        if: always() && steps.docker-build.outcome != 'skipped'
        run: docker rmi security-scan:${{ github.sha }} || true

  # ============================================================
  # Stage 2: Post Validation
  # Triggers: push to main or develop
  # Tests: Smoke + e2e
  # ============================================================
  post-validation:
    name: Post Validation (mypy + Smoke + e2e)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Smoke + e2e
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --dev --frozen

      # mypyをvalidationジョブ内ステップとして統合
      # 設計決定: runner起動コスト~60秒削減 > 並列フィードバック喪失
      # 根拠: テスト612件・信頼度高、mypy失敗頻度低（498df52の並列設計から変更）
      # トレードオフ承認: PR#351で合意済
      - name: Run mypy type check
        run: uv run mypy utils/ config/ models/

      - name: Run smoke tests (Post Validation)
        #  mypy type check失敗時はsmokeをスキップ（fast-fail方針）
        if: success()
        run: |
          uv run pytest -m "smoke" -v --tb=short --no-cov
        env:
          ENVIRONMENT: testing

      - name: Run e2e tests (Post Validation)
        # smoke成功時のみe2eを実行（テストピラミッドgate: smokeが失敗したらe2eをスキップ）
        if: success()
        run: |
          exit_code=0
          uv run pytest -m "e2e" -v --tb=short --no-cov || exit_code=$?
          # Exit code 5: no tests collected (e2e not yet implemented — critical path only, planned)
          case "$exit_code" in
            0) ;;
            5) echo "::notice::E2Eテスト未実装（critical path実装後に自動実行されます）" ;;
            *) exit "$exit_code" ;;
          esac
        env:
          ENVIRONMENT: testing

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-results
          path: reports/
          if-no-files-found: warn

  # ============================================================
  # Stage 2.1: Post Trivy Security Scan
  # Triggers: push to main or develop
  # Strategy: fs scan (dependencies) + image scan (Docker image)
  #   following pr-trivy-scan pattern for consistency
  # Format: SARIF (error differentiation + GitHub Security tab integration)
  # ============================================================
  post-trivy-scan:
    name: Post Trivy Scan
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code (Post Trivy Scan)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ===== Stage 1: Filesystem Scan (dependencies) =====
      - name: Trivy filesystem scan (dependencies) (Post Trivy Scan)
        id: fs-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-post-fs-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify filesystem scan execution (Post Trivy Scan)
        id: verify-fs-scan
        if: always()
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-post-fs-scan.sarif'
          scan-type: 'filesystem'

      - name: Upload filesystem scan results to Security tab (Post Trivy Scan)
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always() && steps.verify-fs-scan.outcome == 'success' && steps.fs-scan.outcome != 'cancelled' && steps.fs-scan.outcome != 'skipped'
        with:
          sarif_file: 'trivy-post-fs-scan.sarif'
          category: 'trivy-post-fs-scan'

      - name: Fail job if fs vulnerabilities found or verification failed (Post Trivy Scan)
        if: |
          steps.fs-scan.outcome == 'failure' ||
          steps.fs-scan.outcome == 'cancelled' ||
          steps.verify-fs-scan.outcome == 'failure' ||
          steps.verify-fs-scan.outcome == 'cancelled'
        run: |
          if [ "${{ steps.verify-fs-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
          fi
          if [ "${{ steps.fs-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が dependencies で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、依存関係を更新してください"
          fi
          exit 1

      # ===== Stage 2: Docker Image Build =====
      - name: Set up Docker Buildx (Post Trivy Scan)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set image tag
        id: image-tag
        run: echo "tag=myapp:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build production Docker image
        id: docker-build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: runtime
          tags: ${{ steps.image-tag.outputs.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fail if Docker build failed (security gate)
        if: steps.docker-build.outcome == 'failure'
        run: |
          echo "::error::Docker build failed — image scan skipped. Security gate requires image scan to pass."
          exit 1

      # ===== Stage 3: Docker Image Scan =====
      - name: Trivy image scan (CRITICAL + HIGH) (Post Trivy Scan)
        id: image-scan
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: ${{ steps.image-tag.outputs.tag }}
          format: 'sarif'
          output: 'trivy-post-image-scan.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          cache: ${{ github.event_name != 'schedule' }}
        continue-on-error: true

      - name: Verify image scan execution (Post Trivy Scan)
        id: verify-image-scan
        if: always() && steps.image-scan.outcome != 'skipped'
        uses: ./.github/actions/trivy-sarif-verify
        with:
          sarif-file: 'trivy-post-image-scan.sarif'
          scan-type: 'image'

      - name: Upload image scan results to Security tab (Post Trivy Scan)
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always() && steps.verify-image-scan.outcome == 'success' && steps.image-scan.outcome != 'cancelled' && steps.image-scan.outcome != 'skipped'
        with:
          sarif_file: 'trivy-post-image-scan.sarif'
          category: 'trivy-post-image-scan'

      - name: Fail job if image vulnerabilities found or verification failed (Post Trivy Scan)
        if: |
          steps.image-scan.outcome == 'failure' ||
          steps.image-scan.outcome == 'cancelled' ||
          steps.verify-image-scan.outcome == 'failure' ||
          steps.verify-image-scan.outcome == 'cancelled'
        run: |
          if [ "${{ steps.verify-image-scan.outcome }}" == "failure" ]; then
            echo "::error::SARIF検証が失敗しました - Trivyがクラッシュした可能性があります"
            echo "::warning::考えられる原因: DB取得失敗、タイムアウト、ディスク容量不足"
          fi
          if [ "${{ steps.image-scan.outcome }}" == "failure" ]; then
            echo "::error::脆弱性（CRITICAL/HIGH）が Docker image で検出されました"
            echo "::notice::対処法: 脆弱性レポートを確認し、ベースイメージを更新してください"
          fi
          exit 1

      # ===== Cleanup =====
      - name: Clean up Docker image (Post Trivy Scan)
        if: always() && steps.docker-build.outcome != 'skipped'
        run: docker rmi ${{ steps.image-tag.outputs.tag }} || true

  # ============================================================
  # Stage 3: Weekly Extended Tests (< 30 min)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Tests: Performance + External API + Full Coverage
  # Note: Security は PR 毎の静的解析（gitleaks, ruff(S)）で代用
  #       Python SAST: ruff S-rulesでbandit主要ルールを概ね網羅（B1-3xx, B310-315含む）
  #       高セキュリティ要件時はbanditを別途実行推奨（ruff S-rulesはbanditの完全な代替ではない）
  # ============================================================
  weekly-extended-test:
    name: Weekly Extended Test
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - name: Checkout code (Weekly Extended Test)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python (Weekly Extended Test)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv (Weekly Extended Test)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Validate lockfile sync
        run: uv lock --check

      - name: Install dependencies (Weekly Extended Test)
        run: uv sync --dev --frozen

      - name: Run performance tests (Weekly Extended Test)
        run: uv run pytest -m "performance" -v

      - name: Run external API tests (Weekly Extended Test)
        id: external-tests  # Used for outcome-based error handling
        run: |
          uv run pytest -m "external" -v --maxfail=5
        continue-on-error: true

      - name: Report external test status (Failure) (Weekly Extended Test)
        if: steps.external-tests.outcome == 'failure'
        run: echo "::warning::External API tests failed - investigate rate limits or API changes"

      - name: Report external test status (Success) (Weekly Extended Test)
        if: steps.external-tests.outcome == 'success'
        run: echo "::notice::External API tests passed - all integrations healthy"

      - name: Full coverage report (Weekly Extended Test)
        # ALL 7 markers: unit/integration/smoke/e2e/performance/slow/external (no -m filter)
        run: uv run pytest --cov=. --cov-report=html:reports/htmlcov --cov-report=json -v

      - name: Upload weekly test results (Weekly Extended Test)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-comprehensive-results-py${{ matrix.python-version }}
          path: |
            reports/
            coverage.json

  # ============================================================
  # Stage 3.1: Weekly Link Check
  # Role: Detailed log collection — runs all files with continue-on-error
  #   and saves results as artifact (does not fail the workflow)
  # Counterpart: markdown-link-check.yml acts as gate check (fails on broken links)
  # Triggers: schedule (Sunday 00:00 UTC)
  # Checks: markdown-link-check (external/internal links)
  # ============================================================
  weekly-link-check:
    name: Weekly Link Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code (Weekly Link Check)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js (Weekly Link Check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Weekly Link Check)
        run: npm ci

      - name: Find Markdown files (Weekly Link Check)
        id: find-md
        run: |
          # Find MD files, excluding ignored directories (sync with .textlintignore)
          find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.venv/*' \
            -not -path './docs/archive/*' \
            -not -path './docs/coverage/*' \
            -not -path './docs/main/6週プラン/*' \
            -not -path './docs/main/learning/*' \
            -not -path './docs/main/Skills作成/*' \
            -not -path './docs/ai_collaboration/*' \
            -not -path './docs/tools/*' \
            -not -path './reports/*' \
            -not -path './.taskmaster/*' \
            -not -path './.spec-workflow/*' \
            -not -path './obsidian-vault-local/*' \
            -type f > md_files.txt
          # Null-terminated for safe xargs -0 in next step (handles special chars in filenames)
          tr '\n' '\0' < md_files.txt > md_files.nul
          echo "Found $(wc -l < md_files.txt) Markdown files"

      - name: Run markdown-link-check (Weekly Link Check)
        run: |
          # Security: Use -print0/xargs -0 to safely handle filenames with special characters
          # Performance note: Sequential execution chosen for weekly job (batch mode would fail-fast on first error)
          echo "# Link Check Results - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > link-check-results.log

          check_file() {
            local file="$1"
            echo "Checking: $file"
            echo "## $file" >> link-check-results.log
            npx markdown-link-check "$file" --config .markdown-link-check.json 2>&1 | tee -a link-check-results.log || true
            echo "" >> link-check-results.log
          }
          export -f check_file

          # Reuse md_files.nul from previous step (null-terminated — avoids duplicate find traversal)
          xargs -0 -I {} bash -c 'check_file "$@"' _ {} < md_files.nul
        continue-on-error: true

      - name: Upload link check results (Weekly Link Check)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: link-check-results
          path: |
            md_files.txt
            link-check-results.log

  # ============================================================
  # Status Report (Summary for all pipeline stages)
  # ============================================================
  status-report:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    # Note: Skipped jobs are treated as 'success' by GitHub Actions
    # !cancelled() overrides implicit success() check, allowing execution after success/failure/skipped
    needs: [pr-validation, pr-trivy-scan, pr-md-quality-check, post-validation, post-trivy-scan, weekly-extended-test, weekly-link-check]
    if: "!cancelled()"
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
        continue-on-error: true

      - name: Generate status report
        run: |
          echo "# CI/CD Pipeline Status Report (3-Tier Test Pyramid)" > status_report.md
          echo "" >> status_report.md
          echo "## Test Pyramid Strategy" >> status_report.md
          echo "- Unit 70% / Integration 25% / E2E 5%" >> status_report.md
          echo "- Coverage Target: 85% (baseline protection)" >> status_report.md
          echo "" >> status_report.md
          echo "## Stage Results" >> status_report.md
          echo "- PR Validation: ${{ needs.pr-validation.result }}" >> status_report.md
          echo "- PR Trivy Scan: ${{ needs.pr-trivy-scan.result }}" >> status_report.md
          echo "- PR MD Quality Check: ${{ needs.pr-md-quality-check.result }}" >> status_report.md
          echo "- Post Validation: ${{ needs.post-validation.result }}" >> status_report.md
          echo "- Post Trivy Scan: ${{ needs.post-trivy-scan.result }}" >> status_report.md
          echo "- Weekly Extended Test: ${{ needs.weekly-extended-test.result }}" >> status_report.md
          echo "- Weekly Link Check: ${{ needs.weekly-link-check.result }}" >> status_report.md
          echo "" >> status_report.md
          echo "## Triggered By: ${{ github.event_name }}" >> status_report.md
          cat status_report.md

      - name: Upload status report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pipeline-status-report
          path: status_report.md
