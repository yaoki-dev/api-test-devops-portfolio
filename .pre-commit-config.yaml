# 軽量版: コミット時の最小限チェック (実行時間 < 3秒)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4              # pyproject.toml[dev]と整合（v0.15.4採用）
    hooks:
      - id: ruff
        args: [--fix]         # 自動修正で即座に問題解決
        exclude: ^tests/Q&A/    # 学習ファイル除外
      - id: ruff-format       # フォーマット自動適用
        exclude: ^tests/Q&A/    # 学習ファイル除外

  # シークレット検出: gitleaks (system binary方式)
  # Go互換性問題回避のためソースビルドではなくシステムバイナリを使用
  # 前提: brew install gitleaks (macOS) または apt install gitleaks (Linux)
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)
        entry: gitleaks detect --source . --verbose --redact
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Markdown品質チェック: markdownlint (Issue #98)
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: ['--ignore', 'node_modules']

# 重いチェックはCI/CDで実行 (コミット時は除外)
# - mypy: 型チェック → GitHub Actions
# - bandit: セキュリティ → GitHub Actions
# - pytest: テスト → GitHub Actions