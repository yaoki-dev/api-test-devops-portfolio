# 軽量版: コミット時の最小限チェック (実行時間 < 3秒)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9              # Python 3.12対応・最新版
    hooks:
      - id: ruff
        args: [--fix]         # 自動修正で即座に問題解決
        exclude: ^tests/Q&A/    # 学習ファイル除外
      - id: ruff-format       # フォーマット自動適用
        exclude: ^tests/Q&A/    # 学習ファイル除外

  # シークレット検出: gitleaks (detect-secretsから移行)
  # gitleaksはAWS keys, JWT tokens, API keys等を包括的に検出
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        exclude: >
          (?x)^(
            obsidian-vault-local/.*|
            tests/Q&A/.*
          )$

# 重いチェックはCI/CDで実行 (コミット時は除外)
# - mypy: 型チェック → GitHub Actions
# - bandit: セキュリティ → GitHub Actions
# - pytest: テスト → GitHub Actions