# Task Master Auto-Execution Allowed Tasks
# Security whitelist for auto-executable commands
#
# Format:
#   <taskKey>:
#     command: "executable command with args"
#     timeout: <seconds>
#     description: "human-readable description"
#     allowedTaskIds:  # Optional: restrict to specific task IDs (supports wildcards)
#       - "1.1.1"
#       - "1.2.*"
#       - "*"
#
# Security Notes:
# - Commands are executed via subprocess.run() with shell=False
# - Timeout enforced at taskKey level
# - allowedTaskIds restricts which tasks can use this taskKey
# - Wildcards: "1.*" matches 1.1, 1.2, etc., "*" matches all

# ============================================================
# Week 8: Regression Testing & Security
# ============================================================

run_regression_docker:
  command: "uv run pytest tests/regression/test_docker_volumes.py --tb=short -v"
  timeout: 600
  description: "Docker volume permission regression tests"
  allowedTaskIds:
    - "1.1.1"  # Docker Volume Permission Regression Tests

run_regression_all:
  command: "uv run pytest tests/regression/ --tb=short --maxfail=3"
  timeout: 900
  description: "All regression tests (fail fast after 3 failures)"
  allowedTaskIds:
    - "1.1.*"  # All Week 8 Regression Testing subtasks

run_security_scan_bandit:
  command: "uv run bandit -r utils/ config/ --format json --output .taskmaster/reports/bandit.json"
  timeout: 300
  description: "Security vulnerability scan with Bandit"
  allowedTaskIds:
    - "1.2.1"  # Bandit Security Scan (if exists)
    - "1.2.*"  # All Security P0 subtasks

run_security_scan_safety:
  command: "uv run safety check --json --output .taskmaster/reports/safety.json"
  timeout: 180
  description: "Python dependency vulnerability scan with Safety"
  allowedTaskIds:
    - "1.2.*"  # All Security P0 subtasks

# ============================================================
# Week 9: CI/CD Integration
# ============================================================

run_integration_tests:
  command: "uv run pytest tests/integration/ --maxfail=5 --tb=short"
  timeout: 1200
  description: "Integration test suite (fail fast after 5 failures)"
  allowedTaskIds:
    - "2.*"  # All Week 9 CI/CD Integration tasks

run_github_actions_local:
  command: "act -j test --container-architecture linux/amd64"
  timeout: 1800
  description: "Run GitHub Actions workflow locally with act"
  allowedTaskIds:
    - "2.1.*"  # CI/CD Pipeline subtasks

# ============================================================
# Generic Test Commands (Available to All Tasks)
# ============================================================

run_unit_tests:
  command: "uv run pytest tests/unit/ --cov=. --cov-report=json --cov-report=term-missing"
  timeout: 900
  description: "Unit test suite with coverage report"
  allowedTaskIds:
    - "*"  # Allow any task to run unit tests

run_unit_tests_fast:
  command: "uv run pytest tests/unit/ -x --tb=short"
  timeout: 300
  description: "Fast unit tests (exit on first failure)"
  allowedTaskIds:
    - "*"

run_performance_tests:
  command: "uv run pytest tests/performance/ --benchmark-only --benchmark-json=.taskmaster/reports/benchmark.json"
  timeout: 600
  description: "Performance benchmark tests"
  allowedTaskIds:
    - "*"

# ============================================================
# Code Quality Checks
# ============================================================

run_lint_ruff:
  command: "uv run ruff check . --output-format=json --output-file=.taskmaster/reports/ruff.json"
  timeout: 120
  description: "Ruff linter check with JSON output"
  allowedTaskIds:
    - "*"

run_typecheck_mypy:
  command: "uv run mypy utils/ config/ --json-report .taskmaster/reports/mypy"
  timeout: 180
  description: "MyPy type checking with JSON report"
  allowedTaskIds:
    - "*"

run_coverage_check:
  command: "uv run pytest --cov=. --cov-fail-under=85 --cov-report=json"
  timeout: 900
  description: "Coverage check with 85% threshold"
  allowedTaskIds:
    - "*"

# ============================================================
# Docker Operations
# ============================================================

docker_build_dev:
  command: "docker build --target development -t api-test-devops:dev ."
  timeout: 600
  description: "Build Docker development image"
  allowedTaskIds:
    - "1.*"  # Week 8 tasks

docker_build_test:
  command: "docker build --target testing -t api-test-devops:test ."
  timeout: 600
  description: "Build Docker testing image"
  allowedTaskIds:
    - "1.*"

docker_compose_test:
  command: "docker-compose -f docker-compose.yml up test --abort-on-container-exit"
  timeout: 900
  description: "Run test environment via docker-compose"
  allowedTaskIds:
    - "1.*"
    - "2.*"

# ============================================================
# Documentation Generation
# ============================================================

generate_coverage_html:
  command: "uv run pytest --cov=. --cov-report=html --cov-report=term"
  timeout: 900
  description: "Generate HTML coverage report"
  allowedTaskIds:
    - "*"

generate_api_docs:
  command: "uv run pdoc --html --output-dir docs/api utils/ config/"
  timeout: 300
  description: "Generate API documentation with pdoc"
  allowedTaskIds:
    - "*"

# ============================================================
# Cleanup Operations (Low Risk)
# ============================================================

cleanup_pycache:
  command: "find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true"
  timeout: 60
  description: "Remove Python cache directories"
  allowedTaskIds:
    - "*"

cleanup_pytest_cache:
  command: "rm -rf .pytest_cache .coverage htmlcov"
  timeout: 30
  description: "Remove pytest cache and coverage artifacts"
  allowedTaskIds:
    - "*"

# ============================================================
# Example: Restricted High-Risk Operations
# ============================================================

# CAUTION: Only allow specific, verified tasks to run high-risk operations
run_database_migration:
  command: "uv run alembic upgrade head"
  timeout: 300
  description: "Run database migrations (RESTRICTED)"
  allowedTaskIds:
    - "3.1.1"  # Example: Specific migration task only
    # DO NOT use "*" for high-risk operations

deploy_staging:
  command: "./scripts/deploy_staging.sh"
  timeout: 1800
  description: "Deploy to staging environment (RESTRICTED)"
  allowedTaskIds:
    - "4.2.1"  # Example: Specific deployment task only
    # DO NOT use "*" for deployment operations
